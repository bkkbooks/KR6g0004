body:
  text: 猶明奢摩他毗婆舍那辨斷煩惱義顯二種滅謂性滅畢竟滅以三空三昧配定慧捨相明成就十法見無相涅槃辨施畜生得百倍報及施闡提千倍報廣辨輕重業定不定業及報定時不定等廣辨菩薩無三塗業見受報事出調達與佛為商主緣起出迦羅富王刑婆羅門緣起釋修道力轉重業為輕業師子吼品之第七師子吼言世尊如經中説至何故復修奢摩他耶案僧亮曰上品末慧能破結今明非直慧功要須三法合用故先説定耳寶亮曰修道之第九也明定慧相資上既出能修道之人今次辨定慧合用故先問也若智慧能治惑何須修定凡夫謂智慧能斷惑故謂煩惱如事像為智慧所除也佛今就五門中釋無斷義若不修定則不達見五門者第一就實法第二就空門第三就到不到第四明伴非伴第五推性滅此五門中撿並無破義佛言善男子汝言毗婆舍那至明能破暗無有是處案僧亮曰能知諸法自生自滅慧不能破非定心見也寶亮曰第一門智慧生時三相所遷當體自滅實法道中有何能破所破者耶善男子誰有智慧誰有煩惱至如其無者則無所破案僧亮曰第二門辨破與不破無主故空也寶亮曰第二門體性俱空故無能破也善男子若言智慧能破煩惱至而能破者是義不然案僧亮曰第三門有無也智起則有故名到不起則無故不到也初念應破者一念破一切結是則不到者如明暗相違明起暗以過去明不及暗不到則同凡夫也寶亮曰第三門語勢如以智到煩惱時破不到時不破義意不爾也謂能破者為當智到行人心時能破為當未到破耶若未到而破則凡夫應破若到故破者則初念應破而今行人有無量念若初念不破則不須後念若果初到便破是則不到也智慧念念生滅初不相及有何到不到義若言到不到合故能破亦無此義復次毗婆舍那破煩惱者至毗婆舍那亦復如是案僧亮曰第四門明伴非伴門也寶亮曰第四門辨八正道中為一道能破共故能破若一能破則不須具修於八若一不能八亦不能乃舉盲者為譬以曉之也善男子如地堅性火熱性至決定不能破諸煩惱案僧亮曰第五門辨滅不滅也煩惱性滅智不能滅若性不滅智亦不能滅先以五大為譬堅他作亦應爾也寶亮曰第五門開此中為三意明亦無斷義初以四大為況各當自性誰使之然耶次意云若言如鹽性鹹強令異物鹹智慧強令煩惱滅者亦不然也後意云煩惱與智慧俱念念滅而言智慧能斷亦不然也善男子如鹽性鹹令異物鹹至智慧之性不破煩惱案僧亮曰明結性非滅智不能滅若以鹹能令淡譬智能滅結也是義不然何故者鹹淡不俱鹹生之時淡已過去也過去自滅非鹹滅也若法無滅云何智慧強令滅者若過去法滅非自滅者云何強令耶云何而言能滅惑他法者為外家生意通上強難也謂智明力強惑暗性弱智能滅惑者亦不然何者二法皆生時即滅生死強弱何能滅他也善男子一切諸法有二種滅至生異滅異無造作者案僧亮曰物有強令他滅理不可然引而破之一念念如水滅已續生即上性滅也如火焚薪更不復續畢竟滅也應有餘燼者色非慮解不待方便任運應起是有也火緣橫奪故有餘燼存可言強滅心待方便未來未有非強滅也寶亮曰上五門説法明無所斷今從性滅究竟滅下去定於法相煩惱亦起即謝不假治道故言性滅究竟滅者就得解作語從起一念癡後則於萬境上不識若修道得解於萬境上悉明迷用永不起名為究竟滅夫道生之時亦無煩惱可斷若解無斷而斷名為正義也本無解時常癡若一剎那明起於境悉達第二運去方受斷名前一念無所形故不得名也若至第二念去云向癡今解本不斷今斷也善男子若修集定至乃至阿耨多羅三藐三菩提案僧亮曰由心不教慧得見空定之用能大利益者斷煩惱利也寶亮曰勸行人若不修定則不得正智正見亦不體上五門破不破之義也善男子菩薩摩訶薩具足至菩薩定慧亦復如是案僧亮曰第三捨用捨無別法為體也執急則斷者草緩則失急則斷也專空著斷譬定多也捨空著有譬慧少也於空不空於有不有定慧等捨之用也寶亮曰此下正辨定慧相資合用之意善男子譬如工匠甘鐹盛金至修是二法能大利益案僧亮曰甘鐹譬定撓攪譬慧也善男子菩薩摩訶薩至是則名為大涅槃樂案僧亮曰上説斷結下説一切德皆由三法所成也善男子定相者名空三昧至是名菩薩行菩提道案僧亮曰有相觀生死也無相觀涅槃也師子吼言世尊云何菩薩知時非時案僧亮曰將釋上時非時之義故問也善男子菩薩摩訶薩至是名菩薩知時非時案僧亮曰不宜修智者智增則慢甚若有菩薩勤修積集至是名菩薩知時非時案僧亮曰不宜修定者是人根鈍煩惱勢盛自疑犯戒皆由著定所以宜修空慧也善男子若有菩薩定慧二法至以是因緣得相涅槃案僧亮曰二法雖等煩惱提起應更兩修能制煩惱然後捨也師子吼言世尊無十相故至即得明了見於佛性案僧亮曰將為始行之人更問涅槃十有餘名顯無相之利令始行修之信也寶亮曰此下修道之第十文也廣因果以結句若具此十法則能見佛性得無相涅槃也師子吼言世尊菩薩摩訶薩至是名菩薩信心具足案僧亮曰信心具足者信為行始故居十法之初也二戒具足云何名為至則能明見涅槃無相案僧亮曰釋備十行也可斷者謂生死不可斷者涅槃從緣生者有為從緣見者無為也果亦如之師子吼言世尊如佛先告至三菩提是義云何案僧亮曰第五轉障門修道轉業次道説也純陀受報未有盡期云何得成三菩提耶僧宗曰上縛解修道成因中已有之難今轉障勸修成前無性七執所以爾者其云下至畜生上窮諸佛皆為福田若施之者則福報無盡豈不以因中無性永在三有耶就轉障中有五段文初明善惡業轉障體第二明菩薩以願力生地獄中非為實生簡出此也第三還正業體上言業可轉人情謂業報渾亂故更辨雖復有轉然業報之義豈可彰耶第四明上雖言轉今出其人第五明人行何行故能轉耶明以如此行故轉即出轉業之行也寶亮曰將明業不定故先引昔教定業作難非唯惡業障道善業亦能障如昔説若重心作業必受果報若爾純陀今者重心施佛受人天果報無盡何當入聖耶世尊如佛經中若施畜生至阿耨多羅三藐三菩提案僧亮曰此明地勝報不可盡業障也僧宗曰施畜生者舉偏教為難也施闡提者取其人類也下極畜生上窮諸佛善惡同然其報無盡都不明轉義是以牽此為難依如昔教世尊受純陀之供則獲報無量何有見佛性成佛時耶世尊經中復説若人重心至云何復得見於佛性案僧宗曰第二難以心重故果應無盡也世尊經中復説施三種人至二父母三如來案僧宗曰第三舉三種病人起慈悲之重父母以恩養邊重如來以四中最勝施此三其福則等引此為證也世尊經中復説佛告阿難至色無色業亦復如是案僧宗曰第四舉昔成説如其無三業者必成菩提是則衆生未曾無此之業則感報無窮何時當成菩提耶世尊如法句偈非空非海中至脫之不受業案僧宗曰第五舉必報不可免也又阿尼樓馱言世尊至具足成就檀波羅蜜案僧宗曰第六舉一食之施尚得八萬劫果以淺況深也世尊若善果報不可盡者至阿耨多羅三藐三菩提案僧亮曰此明心勝也僧宗曰第七以善業類不善業乃至闡提受報無窮則無佛性也佛言善哉善哉善男子至佛十力中業力最深案僧亮曰業已久滅果在後生此理難見喜生疑謗故言深心也僧宗曰將答所問故先致歎也善男子有諸衆生至為度彼故作如是説案僧亮曰開昔定説門也僧宗曰昔説重報不可轉移為人不信故作定説若窮撿於理則不如是夫業乃非不得果但更有餘緣脫其前果故言可轉也寶亮曰本為下愚無智者説也衆生於中不信得果故唱言是定也善男子一切作業有輕有重至一決定二不決定案僧亮曰開今不定門是為一切不定也寶亮曰此下一往先開三門第一辨不定第二出愚智第三出二人所行之法善男子或有人言惡業無果至一切作業無不得果案僧亮曰釋昔定説門也善男子或有重業可得作輕至雖不定得亦非不得案僧亮曰從作業有輕有重此第一翻明業皆不定善男子一切衆生凡有二種至現也輕業地獄重受案僧亮曰釋不定門也唯有愚智者釋所以不定者由人也重惡輕受非都不受也僧宗曰此正釋轉義也言愚人造業乃應得輕苦以其不知慚愧修善之方則罪障日夜增長回此輕報地獄重受若是智人昔曾造惡種此業勢既感三途亦感輕苦以其有修身戒心慧之緣遂使重苦之報不復受也但受頭痛等苦故義唱為轉也寶亮曰此第二出愚智二人也師子吼言世尊若如是者至清淨梵行及解脫果案僧亮曰難意若定受者可修梵行求解脫不定何用求離耶僧宗曰業既不定會當轉惡生善也寶亮曰此下第三出愚智二人所行之法也將欲明義故師子吼先作此難云若必不定則自得去何用修道耶佛言善男子若一切業至則修梵行及解脫果案僧亮曰答意若以決定云何可脫緣不定故所以須修梵行以求解脫耳僧宗曰正以法相不定故可得修有轉義也若使定不可轉者惡家常應為惡乃至少時作業應少時受善男子若能遠離一切惡業至云何而有修道涅槃案僧亮曰重舉諸業謂若定者則有如是失也寶亮曰正以不定故須修道若必定者修道何益耶善男子業有二種定以不定案僧亮曰此下廣前三門後又重舉愚智二人總結句并合前後凡七門定業有二一報定二時定至所謂現受生受後受案僧亮曰釋上定不定業也優婆塞戒説業有四種一報定時定二報定時不定三時定報不定四時不定報不定也今説二者以初二報定合為一也僧宗曰向已明有轉今廣出報定世定為彰可轉之義言報之為理不出世定報定若世報俱定此家為重若報定世不定此為第二若世定報不定此為第三若報世俱不定此為第四寶亮曰此下竟三報業悉為證初第一門業性不定意業有二種定以不定今開四句明業體第一時定報不定此人作業之時莫問輕重但是猛利心中作也作業成後更經營運誓心來逐此業名為業定若此時差則永不復受也報定時不定者此人作業之時心極殷重未必決斷復無誓心故或現受生受後受也俱不定者作時不重又不決斷也二俱定者與上相違善男子若定心作善惡等至供養三寶是名定業案僧亮曰釋定業也寶亮曰此四句第一第二第四於愚人悉定也若智人者四句皆不定愚人無身戒心慧故所以皆成定報也善男子智者善根深固難動至一切諸業不名決定案僧亮曰釋不定業也菩薩摩訶薩無地獄業至非現生後受是惡業案僧亮曰已斷定業不定業不定業願受之證一切業不定令地獄空者説生之益也寶亮曰智人有此四德故皆不定也所以菩薩恆在地獄開悟衆生若其業定何能使物離苦升人天進德也復次善男子是賢劫中至非現生後受是惡業案僧亮曰前説無地獄業此説無業而現受寶亮曰明諸菩薩化生其中以證業之不定復次善男子是賢劫中至非現生後受是惡業案僧亮曰次説無餓鬼業亦現受也善男子我於賢劫生屠膾家至非現生後受是惡業案僧亮曰次説無十六惡律儀亦現受也善男子是賢劫中復生邊地至非現生後受是惡業案僧亮曰次説無八難等報障善男子我念往昔至是名菩薩摩訶薩説現世報案僧亮曰廣出提婆達多往昔緣起事耳善男子我念往昔至是名菩薩摩訶薩説現世報案僧亮曰又廣舉緣起重證久來無也善男子善業生報後報至一切諸業悉得現報案僧亮曰向明現報今舉生後亦如是皆是慈善願力亦現受也不善惡業得現報者至是名惡業現受果報案僧亮曰向明以善業願受今明以惡受也生報者如一闡提犯四重禁及五逆罪案僧亮曰此三人皆重故生報也唯人能起此業而人身小受苦少故不得現受也後報者如持戒人深發誓願至轉輪聖王教化衆生案僧亮曰淨戒身報得淨戒身及轉輪王非一身可集故後報受也善男子若業定得現世報者至無善藏者輕業重受案僧亮曰現報業輕不能得後報後報業重故現生正報也寶亮曰凡有十二譬廣上第二門出愚智二人事也蓋欲顯智者之解愚者之蔽可不誡哉
