body:
  text: 釋大涅槃小涅槃義舉有山大山等喻釋聲聞習氣義釋有因緣名及無因緣名義釋五神通義辨二種神通一與外道共一與二乘共辨涅槃非音聲之音德王品之第五爾時光明遍照高貴德王至云何涅槃云何大涅槃案僧亮曰所以重問者雖説斷漏能得涅槃常樂我淨不説我樂自在之用涅槃之義未彰故也寶亮曰次下答德王第二問也上聞不聞中佛答六難竟更設二問佛答一問竟今更舉第二問以請釋也爾時佛讚光明遍照至是名涅槃非大涅槃案僧亮曰涅槃雖有多義會是無苦之稱得息苦者皆得名焉寶亮曰今借十譬以辨大小之相異正以無苦樂故名涅槃也若得少食以除飢苦亦名涅槃但不得名大涅槃如是十種譬其義一例小海亦名海大海亦名海若除少苦名小涅槃若除苦都盡名大涅槃其文中自廣彰云二乘人八萬劫乃至一萬劫名小涅槃者上乘三處明皆言到佛果今此中説名小涅槃其義云何若欲於我前不言行八萬劫竟名小未行八萬劫之前隨其所得住處以此義為小及其行八萬劫竟得佛由名大涅槃而此旨於一部之中雖復説異亦莫測其然要隨義而安也善男子若凡夫人及以聲聞至乃得名為大涅槃也案僧亮曰凡夫因世俗聲聞因聖道者更釋非之義也還生煩惱者釋凡夫也有習氣者釋聲聞也善男子譬如有處能受衆流至之所得故故名為大案僧亮曰前説人實後説法實合海譬也河城等皆合也十譬之中唯不合地及天中天二譬也云何復名為大涅槃至以是義故名大涅槃案僧亮曰八自在者各有文也一者不小能小不多能多也二者以小為大也三者以重為輕也四者以三事體心色不移無處不至所作事一而見者不同也五者一根知六塵也六者見法如空也七者得一切法也八者不可見令一切見復次善男子譬如寶藏至具足成就初分功德案僧亮曰無為名大釋常住故故稱大也復次善男子云何菩薩至昔所不得而今乃得案僧亮曰諸漏既盡則具神通皆聖行功德也今見者謂眼通更就所得中分別也今聞者耳通也今到者如意通也今知者他心宿命也寶亮曰第二功德以五通為體此五是一方之所須菩薩化道之要用第一修天眼通須見衆生身業二修天耳通聞其口業三修他心通知其心業雖知三業若不達其過去有善惡之厚薄可化亦於化道有闕故次修宿命通而下愚之流難以玄言必須運身到彼然後受化故第五次修身通今就文所辨先明身通昔明身通直據色身轉變而已今談色心自在修短所通適物所宜而經亦有言如意通亦名身通若立身通則沒如意名言若立如意便廢身通若如昔教明五通是禪定家果要因定後方能發通就今涅槃經明五通盡是智慧之異用故菩薩摩訶薩依六行教學不取有無相但使物感稱根而應如一家所解此五通必是菩薩家化方非外道凡夫聲聞之伎何以知耶若實是凡夫云何得有此法而在外道中唱言有者皆是應迹外道雖言得禪定而無有道思慧所以無此神德也聲聞人觀解既不成復不能即在定而變通亦由已安法不得所復未能忘懷故發家唱云菩薩所得通不與外道聲聞二乘等共之通有二種一者內二者外至昔所不得而今得之案僧亮曰不與外道共五通也一心作一者釋不與二乘及外道共但舉二乘外道可知也寶亮曰雖言二乘人一心作一不得衆多此正表二乘不得道之意聲聞入定發通要須定前作意作意若一在定唯能一變若作意作五事便能現五變雖在定併發五耳由得言一心作一何以然由其前方便有五故若極利根者在定亦容可得二變此皆據教迹作諸菩薩則不然發輒修德以曠被為懷及至物感則稱本心隨力而現不假興意若無六行解者則不能一心現五通身也又復云何昔所不得至昔所不得而今得之案僧亮曰如意説名自在於自在中分作變化初對凡夫故言不爾復次善男子菩薩摩訶薩至而諸衆生各各見異案僧亮曰得異耳根者有三事異一者下地聞上地二遠及恆沙三耳識不取相是不聞而聞初無音聲相者菩薩耳識真俗兼見故不取相復次善男子云何菩薩至昔所不聞而今得聞案僧亮曰此下明天耳通而文中敘相皆是初學之方法昔小乘明天耳通耳識取聲然後生智二心更相資導故合二心為通天眼通亦爾今用此經中學得天耳天眼乃至得通六識之用即是智慧故天眼通即中作二諦觀此經既理教真正明有為無為二理炳然心行大法生解亦大若始行之流則未及此也爾時光明遍照高貴德王至云何而言無定無果案僧亮曰即是定果相者若作因定善即是果相者從善因生即是果也爾時如來讚言善哉善哉至凡所演説無定果相案僧亮曰答意謂若刀是定因面是定果者云何顛倒耶善男子夫涅槃者實非聲果至吾當為汝更分別説案僧亮曰上説一切因果不定此説涅槃常法非果善男子若有善男子至故得阿耨多羅三藐三菩提案僧亮曰一字不作字相一句不作句相從經理門可説為聞因之成果不如是者則非聞也善男子如汝所言聞惡聲故至昔所不聞而今得聞案僧亮曰涅槃非果可如上説三惡是果聲是定因須更説之善男子云何昔所不見至昔所不見而今得見案僧亮曰若依欲界四大者依欲界定修得天眼通悉是骨相者天眼識能見不淨諸法空相見因緣相者空有兩見也寶亮曰此下明天眼通此明天眼通不但見色亦見衆生善惡心乃至知第一義諦故所以作知名説也若見衆生所有色相至昔所不知而今得知案僧亮曰知大小根者乘色故知根也一觸衣知心者因身知根同乘色知心義屬天眼故下知見兩名也復次善男子云何昔所不知至昔所不知而今得知案僧亮曰次明宿命通也復次善男子云何昔所不知至具足成就第二功德案僧亮曰須陀洹十六心者三諦由滅見也昔見滅未徹三諦不明既已見滅遍四諦起念現前其心甚遠是果十六心也寶亮曰下去次明他心通知須陀洹初心次第至十六心者聲聞人欲知初心捉法不能得若利根者要至第七心方知若鈍根者至第十六心方知菩薩不爾十六心一一次第差別盡知也
