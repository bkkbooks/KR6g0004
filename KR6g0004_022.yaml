body:
  text: 釋月有六事以譬法身釋日及歲星譬釋未發菩提心為作菩提因緣事釋一闡提不受道事月喻品第十五案法瑤曰從見月不現至譬如日出衆霧悉除答云何如日月大白問也上長壽金剛明法身體相名字功德品結經名也經之大體以涅槃為極致下竟解脫皆明大涅槃義耳從四種人竟四到明弘經人即是長壽金剛緣因也從二十五有有我不耶竟共聖行鳥喻明佛性即是金剛長壽正因也一周大明因果義訖今復明長壽金剛應感無方之能也僧宗曰上鳥喻遍就六行以明圓理今月喻遍明法身真應之德也寶亮曰猶答第十二問未竟更偏明常樂我三德也佛復告迦葉譬如有人至為化衆生示有生滅案僧亮曰月譬有六事此第一明雖生不生成前品未應物之迹廣常義也問曰在前而先答月者以月事廣故也法瑤曰明一應之迹始終也僧宗曰此譬中有五重第一舉今一化始末第二明非但於此乃遍十方也第三寄月食辨示有出身血事而實不可傷也第四顯壽之修短隨感而應也第五明如來是衆聖之王能為物益也須彌障故不見者有四天下而須彌處中日月運行周回旋轉也善男子如此滿月餘方見滿至是故名為常住不變案僧亮曰第二事廣上生滅義也從初至十五日廣生義自下廣滅義也復次善男子譬如滿月至如來常住無有變異案僧亮曰第三事普應六道隨感而現亦是廣生中事也在在處處者既大小之器不同月形亦異譬六道既殊迹亦不一也百由旬者向舉水器明隨處而現此明去來隨人也僧宗曰猶是第二事復次善男子如羅睺羅至分別法句如彼醫子案僧亮曰第四事為制戒故示有出身血等也法瑤曰明果報必受也僧宗曰第三事也寶亮曰此示制戒凡有三意第一明法身無損猶如滿月雖有其事而無所傷第二所以無傷引二人共鬪本無殺心雖死無罪第三舉醫譬明有此示現必有利益也復次善男子如人見月至是故如來常住無變案僧亮曰第五事顯現涅槃及業報等也法瑤曰前示行惡止善也此示行善制戒也僧宗曰第四事月實不蝕似損月取譬涅槃復次善男子譬如明月至故言如來譬如明月案僧亮曰第六事佛之功德略如彼也僧宗曰第五事也法瑤曰既示行善制戒止惡今明樂法衆生從教無厭也復次善男子譬如日出至即是諸佛真實法性案僧亮曰答日問也有二譬初取長短為喻次以損益為譬也復次善男子譬如衆星至猶如世人不見晝星案僧亮曰答太白星問也法瑤曰譬法身玄妙寂寞絶於視聽之表於情為隱唯見丈六謂之為極二乘之謂言無故二乘不見也復次善男子譬如陰暗至不為諸垢之所染故案僧亮曰總以日月譬三寶滅也法瑤曰譬佛在世人謂體盡丈六是則無有常住法身今明涅槃之後故異上耳復次善男子譬如黑月至如彼日月無有滅沒案僧亮曰答慧星問也謂佛不並興若辟支出世真佛滅度人生倒見謂不祥也僧宗曰黑月者以修羅手障令不見也又言水精白銀為月以水精邊故如黑月也復次善男子譬如日出至一切諸惡無間罪業案僧亮曰已證佛常六行已顯今説經功德及聞經之益勸人受持通答二問云何未發心而名為菩薩至猶如閻浮金無能説其過也法瑤曰前日月太白慧星等譬廣上長壽金剛品也今次廣上名字功德品也一經耳者起一聞之功終藉此慧衆惡消除不言一經歷耳煩惱便盡也正顯此經功能滅惡生善齊法身也竟良醫譬皆明經力也僧宗曰經之置品乃出自後人隨義類而標之耳謂菩薩品名應在此初相承仍舊輒改為難付之來哲也寶亮曰若經生歷死發心之者名發心菩薩今言未發心者就一生之中作論也此生中未經發心但見涅槃經改惡修善起弘護之心便名發心菩薩也將欲廣答此問故先借日月之光以譬涅槃經也智秀曰此下有三意第一從此訖答二難廣顯經力也第二次因迦葉舉其前問即是正答所問第三後廣釋除闡提之義也是大涅槃甚深境界至正法不斷僧寶不滅案法瑤曰此明思慧思惟常住三寶之心是故應當多修方便至阿耨多羅三藐三菩提案法瑤曰此明修慧也以勤學故得近無上道故言不久是故此經名為無量功德所成案法瑤曰此經正明佛是常住常住猶三慧而成今以此三苞一切行盡故言無量功德之所成也亦名菩提不可窮盡案法瑤曰因既無量果亦無窮以因果俱無量故故稱大以不盡故故得稱為至身無邊故名大涅槃案法瑤曰有般若智光故法身無邊以此二事名為大涅槃也菩薩品第十六復次善男子如日月光至是故復名大般涅槃案道生曰雖未發心而得為菩提之因與大權無異若聞佛性信解則是菩提心發乃為因耳若生誹謗豈為因耶僧亮曰衆生受道必由內信信之微者無過四重五逆善根不斷由如毛髮藉此微善感涅槃光成菩提因得名菩薩不畏大衆如彼真金無過可説也作菩提緣者菩薩以發心為因住前三十心是初發心之因即日未有此心而有重惡所障以經力故得作菩薩也法瑤曰向明能滅諸惡此明能生諸善發菩提心也僧宗曰善根未斷必有絲髮許也經有緣發之力能令感悟深自改悔上求佛慧下度衆生令未發心作菩薩也入毛孔者將明此經力能除暗稱為光也善以感教教善相扶義如入也所益未深稱毛孔也迦葉菩薩白佛言世尊至云何能斷一切煩惱案僧亮曰夫有三障則不受道若聞皆作菩提因者則善惡無差也如來何故説四依義者若一經耳以是耳識所得已為菩提因者何故昔云依智不依識耶云何斷一切煩惱者夫不退菩薩要伏斷煩惱若不解義云何伏結耶寶亮曰兩難各有兩關便成四也初關一往且非今旨也若三種罪人聞經便為菩提因者治戒破戒復有何殊第二關即以四依品結難也謂治戒者聞經亦為菩薩破戒者亦爾者何用四依出世治破戒耶又如佛言第二難亦兩關初關即引上鳥喻品云若能歸依一體三寶者雖有煩惱如無煩惱若果一聞此經便能決信即令煩惱根虛者佛四依品中自説恆沙佛所發心聞經尚不解義云何一聞經耳便斷煩惱第二關即以理徵結成難也謂解惑相違也彼之積德猶尚未解而此之經耳云何除惑耶智秀曰有兩難第一云若三種罪人心不樂向而以經力強令發心者何須依四依人耶第二若果發心便是得理即能遣惑者云何彼云三恆河沙佛所發心猶未解義此彼二説未可解也佛言善男子除一闡提至以是義故名為大事案僧亮曰除一闡提者具三障故也云何為具謂不見因果煩惱障也説無因果業障也世世積惡今成闡提報障也其餘衆生聞是經者謂四重五逆雖有惡業聞經生信必久種功德非無因也凡夫下劣不得聞者謂不應經耳聞亦不生信也迦葉菩薩白佛言世尊至未發菩提心者得菩提因案僧亮曰謂此二人既有業障應障發心云何得發耶僧宗曰二難既通今廣明經力發心之由佛告迦葉若有聞是大涅槃至大乘妙典真佛所説案僧亮曰見羅剎像者以有障故雖復聞經不即發心由經發夢夢見業果懼苦發心經之力也憶念菩提者發心有強弱也強者生人中弱者生三塗雖受罪報菩提之心不絶也法瑤曰誹謗經者將絶之時謗對相現方生怖懼臨終之時其心憒亂謂之夢也罪對切人可怖可懼有過羅剎也寶亮曰大論經教有二時明義也經言以下下智斷上上煩惱者應以昔經治三種罪而今涅槃之教方云能除此惑則於理相反云何為中耶經言下下智斷上上惑者此據真無漏道斷通為語今所釋兩經正明伏道也夫起惑之與生善本在有漏心中若心重心輕善惡俱爾也昔經明理不圓解亦微鮮故以輕善伏於輕惑今經所明理既周足信解深勝故以增上之善得抑上上之惑所以知如此者如戒律中若犯第二篇則於二十人中懺方滅犯第三篇以去直對手而除乃至突吉羅罪責心而遣若尋此為言則應輕罪須多人而滅也今則不然故知昔經理淺生善則劣止伏輕惑今經理深生福增上能伏重惑尋此而推昔經不能令人得道明矣復次善男子如虛空中至一闡提輩立菩提因案僧亮曰手瘡者闡提以耶見為手有善則壞取譬瘡也復次善男子如馬齒草至密緻猶如金剛不容外物案智秀曰雨降無甄密緻者不受闡提如是豈法雨之咎耶迦葉菩薩白佛言世尊至如是所説有何等義案僧亮曰引昔説作惡不悔偈證闡提不可化也僧宗曰更問昔偈廣彰其惡先舉可畏欲顯後偈無畏義也寶亮曰此下答第十五問明三種罪人聞涅槃經改悔修善能為人天之福田也本時有惡恆畏大衆今改往修來則無懼矣此答中説三偈初一行作造惡於衆有畏之偈佛言善男子不見者謂至嶮惡道者謂諸行也案寶亮曰佛自廣釋也迦葉復言如佛所説至如王夷坦道是義何謂案僧亮曰引昔作罪能悔之偈證四重可化也上説發心今説除惡也僧宗曰此答云何於大衆得無畏言依經改悔廣修諸善衆惡消滅如王夷坦道也寶亮曰此第二偈政明惡時不畏大衆説其本乃惡今依經改悔者也佛言善男子見所作者至何以故諸佛法爾案僧亮曰至無至處者無至名無始從無始已來盡發露也又無至名涅槃以發露能至涅槃也膏油俱盡者言佛由行得自然相好亦與人俱滅耳若有菩薩以下不信二人用發露功德回向菩提即名菩薩也為闡提毀訾言無因果然諸菩薩不以彼惡不捨而不救也寶亮曰從有生死際至涅槃以來所作惡業盡皆發露作此心而悔則無罪而不滅也獼猴捉水中月者為闡提作喻夫水中之月月之影也獼猴譬闡提月譬涅槃水譬有漏相善水中月譬涅槃影也無水則無月影緣有佛説有漏之善善本資向涅槃氣分相關也凡夫修相善故遏重惑得人天報無大麁苦顛倒謂樂猶如闡提見生死中五欲之樂謂為真實也作惡不即受如乳即成酪猶灰䨱火上愚者輕蹈之案僧亮曰作惡方便及闡提之惡不即受報闡提生報非現報也如乳即成酪者乳有現果明不如此愚者輕蹈者愚人見現在不見未來以非現報而輕造之將出闡提之行先説偈也僧宗曰還釋作惡之人所以造罪以不見後世故爾若使前念為惡後念受報誰敢為惡以不見後世故如灰覆火愚人所踐不覺燒也寶亮曰第三偈明不依經悔者也一闡提者名為無目至流轉生死無有窮已案僧亮曰無目者謂但見現在不見未來也不見羅漢道者羅漢能斷未生而此人不見也寶亮曰譬如王使者乃應出是羅漢似闡提而但將菩薩來對明此羅漢堅信大乘一向撥法華以前經云非實而是方便言中乃以闡提也王使譬菩薩也善談論者明菩薩四辨也奉命他國者捨法身之地應生死也寧喪身命終不匿王説者乃可為外道所弊終不唱佛是無常也譬如蓮華者喻行人也既協信作罪若見涅槃日者其信心必增明也復次善男子如優鉢羅華至何以故非法器故案僧亮曰答問云何處濁世不污如蓮華與二人為譬雖有重罪不障發心不為罪行污也法瑤曰明菩薩能於衆無畏必忘身命宣弘常住而惡之世耶見誹謗其説而執解不從不改其操是處濁世不污如蓮華也夫能不從外耶者皆由自己肉眼伏纍不為煩惱污其內心也故處煩惱不能染也四種蓮華生淤泥中不為彼淤泥所污答處世不污也次下句雖有煩惱終不為所污以知如來性相力故至譬良醫答煩惱不染也
