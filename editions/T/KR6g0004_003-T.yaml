body:
  text: 出諸離車在虛空坐去地七多羅樹又出諸大長者亦去地七多羅樹出諸鬼神及禽獸異名敘變林及重閣講堂事釋魔王說呪事出無邊身來事序品之第二爾時復有四恒河沙至及閻浮提諸王眷屬案慧朗曰此下第三列諸豪族也為求法故善脩戒行至於虛空中默然而住案僧亮曰去地七多羅樹者彼以豪族自憍不願雜坐故置之空也爾時復有五恒河沙至繞佛一匝却住一面案僧亮曰陀那婆王者阿脩羅例也此言隨也爾時閻浮提中比丘比丘尼至其林變白猶如白鵠案僧亮曰貪生愛壽者以佛滅為苦今明滅非作法乃息偽反真也五色之中白是真實自然之色不可染成借事表理也僧宗曰向三種瑞人中悉集今現此相以催諸天速集也於虛空中自然而有至皆悉悲感愁憂不樂案僧亮曰今說涅槃無一切有故名為空希有常樂萬德如虛空中有堂閣也爾時四天王釋提桓因至來至佛所稽首佛足案僧宗曰魔多是聖人如今是實佛以大慈能轉其惡也而白佛言我等今者至除滅怖畏說如是呪明駿曰案維摩經云十方世界作魔王者多是住不思議解脫菩薩信之於此矣侘枳咤咤羅侘枳盧呵隷至阿羅遮羅多羅莎訶案僧宗曰若能窮達其旨經之與呪竟何所在但物心難以理從易以威逼呪方別是止耶之術魔無法以助化說呪以弘道也慧朗曰此有三階前明魔以神力施地獄之樂辦供而來此第二說呪以請印可之是呪能令諸失心者至心懷愁惱却住一面案僧宗曰歎呪功能復明己自為護以勸受持也慧朗曰此第三請佛受供印呪佛不受供而印其呪也爾時大自在天王與其眷屬至天人師佛世尊案僧亮曰此菩薩所以現者美大之辭也此中明身大彼土莊嚴眾生清淨世樂之極遠來獻供更求勝法者證有為非樂也慧朗曰此下有兩段初辨無邊次明佛神力也辨無邊身中有八章此即第一略敘彼土佛事也爾時彼佛即告第一大弟子至并可禮敬請決所疑案慧朗曰此第二彼佛命使來爾時無邊身菩薩摩訶薩至所有威德悉滅無餘案慧朗曰此第三敘時眾驚怪也是時文殊師利法王子至如來不久當般涅槃案慧朗曰此第四敘文殊安慰大眾也是時大眾一切悉見至如是流布大乘經典案慧朗曰此第五敘菩薩神力爾時無邊身菩薩至如來不久當般涅槃案慧朗曰此第六明菩薩以神力令身中眾生得法悟也爾時無邊身菩薩至餘無能見是菩薩身其量邊際案慧朗曰第七明以神力辦供爾時無邊身菩薩及其眷屬至如是三請悉亦不受案慧朗曰第八明以供上佛佛不受爾時無邊身菩薩及其眷屬至却住一面皆亦如是案慧朗曰舉十方同到者總結爾時娑羅雙樹吉祥福地至見諸佛土亦復如是案慧朗曰此辨佛神力有兩章此即第一光明變穢為淨也爾時如來面門所出至身諸毛孔流血灑地案法瑤曰化緣周畢表涅槃之相也有三種一眾生心淨二國土淨三收光入口收光入口則止教之相眾生心淨則表化周國土淨者則明行畢也慧朗曰此第二階示涅槃之相也
