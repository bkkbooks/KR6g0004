body:
  text: 釋從佛出十二部經從十二部經出修多羅從修多羅出方等經從方等經出波若從波若出涅槃義出菩薩在雪山為半偈捨身緣起聖行品之第九爾時衆中有一菩薩至阿耨多羅三藐三菩提案僧亮曰此經明復説經功德勸人行經經即法也行法雖由人然滅惡由法也譬藥能治病雖由人能服然去病之力在藥也是以法華經云若罵佛者是人罪輕毀經法者罪則重也寶亮曰此下第四段歎經流通也有四翻第一無垢藏王歎第二佛自歎第三迦葉歎第四佛引證成迦葉所歎也此即第一無垢王歎時佛讚言善哉善哉至無量無邊不可稱計案僧亮曰佛教從小起牛譬佛也乳譬三藏酪譬三乘雜説也生蘇譬方等熟蘇譬説空般若醍醐譬涅槃經法也法難見者空有也以般若説空涅槃説有也佛難見涅槃為勝尊重讚歎也僧宗曰聖行所以而成功由經力生人圓解也如從牛出乳者佛説小乘四諦法輪此是成佛十二年中説也從乳出酪者謂十二年後説三乘通教大品經是也酪出生蘇者如思益維摩抑挫二乘稱揚菩薩也從生蘇出熟蘇者説法花破無三因果也今此經明佛性常住窮理盡性如醍醐也又出十二部者小乘十二部也從十二部出修多羅者空教修多羅也但言修多羅者攝十二部故但言本耳出方等理正不耶二乘等學般若故以通教為方等也出般若者一乘實慧般若也從般若出大涅槃者即今教也又一解云此經文小誤般若應為第三方等應在第四也寶亮曰佛如牛也五味譬五時教也佛初出世十二年中小乘三藏別相説法輪置出世之教始當十二部之名也從十二年後通教門中辨空有明真俗二諦理既深廣如從乳出酪二諦是空解之主亦是萬解之本所以當修多羅名也但自通教之前直明因果義不辨二諦忘相故不與本之稱從修多羅出方等經者自通教説後述維摩思益進聲聞行令捨執得解故以方等經譬如從酪出生蘇也從方等出般若波羅蜜者般若言智慧從説維摩後明法花辨一因一果智慧開明以譬般若喻之熟蘇也既説法花經竟涅槃教興明理具足猶若醍醐也迦葉菩薩白佛言世尊至恭敬供養尊重讚歎案僧宗曰迦葉是請法之主自説修行之相法瑤曰上來雖明聖行未盡其美此章廣明慕法情重捨其身命不以為難以此捨心修習聖行往不備以此苦行何往而退聖行之難莫過於此故以斯行結聖行之終矣爾時佛讚迦葉菩薩至諸行無常是生滅法案智秀曰先説無常也以二理必對必應圓説故謂半如意珠也説是半偈已便住其前至生滅滅已寂滅為樂智秀曰説常也寂滅無苦以無苦故名之為樂無更別樂故云寂滅爾時羅剎説是偈已至大般涅槃修於聖行案僧宗曰上已讚其所行為難今引昔事以證護法之不虛求法之至也
