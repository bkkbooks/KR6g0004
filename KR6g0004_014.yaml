body:
  text: 雜廣解脫義釋一等四執義四相品之第四又解脫者名曰甚深至真解脫者即是如來明駿案前已廣上八味竟也此下更舉別義是二乘所不能入者也此總歎甚深不可見也又解脫者名無舍宅至真解脫者即是如來明駿案雜舉衆德隨所樂入而解釋也又解脫者名斷一切至無漏善法斷塞諸道案僧宗曰斷邪見諸道也所謂若我無我非我非無我案僧宗曰我者常見無我者斷見也非我非無我者此第四家計也𨷂第三家第三家云亦我則不同第一家亦非我復不同第二家所言不同者謂不全同乃片同耳今第四家復異第三家也言非我者不同第三家斥我也言非無我者不同第三家斥無我也雖有此言及其撿核亦不得異第三家之也唯斷取著不斷我見至真解脫者即是如來案僧宗曰生死非我橫生我心此是取著應斷也佛性是理不斷此也又解脫者名不空空案僧亮曰常樂我淨是一實又解脫衆苦是二實故名不空空空空者名無所有至實無解脫故名空空案僧亮曰尼揵所計解脫無常樂我淨一空又非解脫二空也名無所有者體是無常又非解脫無所有者也真解脫者則不如是至而復無有水酒等實案僧宗曰水酒瓶者為不空空譬也乃可無水而器不空明涅槃乃空無生死耳而常果不空也解脫亦爾不可說色至誰受是常樂我淨者案僧宗曰垂形六道處處見色也以是義故不可說空及以不空至如來即是涅槃案僧亮曰本末釋之貪是結本相名貪境也貪與所貪繫縛三有一切煩惱由之而起故生死之數因果無窮永斷貪故次第而滅一切解脫一切衆生怖畏生死至阿耨多羅三藐三菩提案僧亮曰上廣說解脫令人歸也法相有三何者法相常定貴其先覺先覺者歸佛也所覺者妙歸法也非法不得名覺也小覺諸法非我假用境智合用生死可除識其合用歸僧也歸說行始此明其終終得盡苦名解脫也迦葉菩薩白佛言世尊至非是聲聞緣覺所知案僧亮曰涅槃一法具二也二言俱在當也佛法僧常者常即涅槃常名是一而三事即涅槃僧宗曰如三歸之異者當知涅槃似不一體欲令如來釋會三歸所以體一而義異之旨也佛以衆生畏生死故為說三名非所以別體也有法名一義異者此更開釋所以得有施三名之竟也夫施設名義自有多塗如佛法僧常是名一而三義是異佛以覺為義也法名不覺者法以軌為義非覺義也涅槃名解脫者即是無纍彼自有釋義也今解脫者是翻彼義釋也虛空名非善者非善非惡也此證名義俱異者矣我昔告彼提者引證三歸名義不應一也就別體法僧則體義俱異今就佛上則其體雖一逐義為三不可以體一故使義不得三也謂義有三欲令體亦別也說一為三者隨方設化說法不同三歸亦爾也迦葉復言如佛所說至真解脫者即是如來案僧亮曰生滅聚積名身也分別苦樂名智也涅槃無此故名捨也誰受安樂者上說種種樂明非受樂故發問也身得安樂者有食有身有識分別名為苦也無食無身不生分別名為樂也無受樂者無受理圓不可以方事喻也此中諸譬皆是少分耳僧宗曰食已悶者行地之時貪嗜五欲譬之於食為惑所蔽如心悶也出外欲吐者標心離苦義言出耳欲除煩惱吐已還者修道斷結功登果就俯入生死譬如還也同伴問者如迦葉今所問也若言差者如來解釋果地之妙極也顯別昔曰捨身捨智言虛不實也迦葉復言不生不滅至如來之性即是解脫案慧朗曰迦葉因釋解脫有此句也故以為難請重釋也佛告迦葉善男子是事不然至不可以譬烏鵲之音案僧亮曰以鳥譬鳥以聲譬聲遍取同鳥不得相比也分取可譬佛聲也爾時佛讚迦葉善哉善哉至知諸法性皆亦如是案僧亮曰以是因緣者少分因緣也無能匹者非遍喻也為喻者少分也迦葉復言云何如來至成就滿故名大般涅槃案僧亮曰凡聖不可相譬若分取可借凡以明聖也雖不具足者逆罪有二種一者但以心重為不具足二者以心重事重為具足迦葉菩薩白佛言世尊至當作如是護持正法案智秀曰迦葉領旨佛讚述也
