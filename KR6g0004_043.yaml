body:
  text: 耆婆勸闍世王詣佛廣說雜緣起事出頻婆娑羅於空中勸闍世事釋月愛三昧義為闡提作一柱殿義梵行品之第八王今且聽釋提桓因至所有重罪必當得除案僧亮曰昔未說治罪人有驗今出所治之人為證大王且聽有婆羅門子至為無上醫非六師也案僧亮曰鴦崛摩羅此言指鬘也大王復有須毘羅王子至為無上醫非六師也案僧亮曰昔有慳貪今日渴飢聞說其過心生慚悔見水得飲大王舍婆提國群賊五百至為大良醫非六師也案智秀曰第四廣出諸蒙益之事明佛有道力能曠益無窮也大王若能信臣語者至若不見信願善思之案寶亮曰上至此第六引現事為證自佛出世至今有犯罪而見佛者無不除滅云何王罪獨不滅耶大王諸佛世尊大悲普䨱至亦當視佛如父母想案僧亮曰恐王思惟不敢求佛次說大悲怨親平等廣出等事也僧宗曰第四廣引證以勸王行大王當知如來不但至發阿耨多羅三藐三菩提心案僧宗曰第五明佛普覆不限一人也寶亮曰第七明佛平等無有彼此也智秀曰第五佛心不偏所以能除王罪也大王假使一月常以衣食至到如來所誠心聽法案僧亮曰犯罪既重唯應聽法非財施所能滅也僧宗曰第六格量去留功德多少也寶亮曰第八明佛功德智慧因重能滅人罪也智秀曰第六明佛能加益人心所以見佛必有福利也爾時大王答耆婆言至深自鄙悼都無去心案僧亮曰不以往為慮自鄙穢累非聽法眷屬往恐不必接敘也僧宗曰第七王自念罪重無去心也寶亮曰雖聞上六種勝說猶未敢去也爾時空中尋出聲言至瘡蒸毒熱但增無損案僧亮曰證耆婆之言王罪既重唯佛能除故說佛欲涅槃勸速往也僧宗曰第三別也前外道勸覓邪見師次耆婆勸也今其父自勸令隨耆婆語也寶亮曰闍世向疑罪重恥至佛所其父恐隨耶師今故勸也智秀曰此下第三其父以神通之力勸之令詣佛也爾時世尊在雙樹間至至無量劫不入涅槃案寶亮曰此明如來見闍世之心自可救之理言味而求正為欲從闍世解常故耳迦葉菩薩白佛言世尊至何故獨為阿闍世王案寶亮曰時人不解此旨故迦葉致問也佛言善男子是大眾中至是故悶絕自投於地案僧亮曰聖人現滅欲以益物若生定滅之倒致悶絕之苦者佛則為之不涅槃也善男子如我所言至大涅槃經亦不可思議案僧亮曰釋密語也前四句出所為之事後二句說涅槃不滅不應以佛滅故悶絕也寶亮曰釋時之疑也非直一人并為一切未解常者也智秀曰此下有七別明佛放光引王詣佛佛為說法滅王罪也至彼自言其七事此即第一先唱密語爾時世尊大悲導師至身瘡即愈欝蒸除滅案僧亮曰所以慈光遠至者王聞父誨地獄苦報必受不疑謂罪不可消自鄙凶穢佛不接顧有此二疑不敢詣佛慈光遠至二疑俱釋也僧宗曰此下第五段也前言為王住世治其心雖有其言未見其實月愛三昧始為驗也寶亮曰先治其身後治心也智秀曰第二放光滅苦也王覺瘡愈身體清涼至先治王身然後及心案僧亮曰引雙樹經稱曾聞人說夫劫火不燒眾生先有三月並照除眾生病使得修禪上生月光既出無病不愈其時未至而有妙光所以喜而問也答云應故現光無定相也非色非非色雙釋真定相也非青非黃偏釋真也為度眾生者偏釋應也王言耆婆如來世尊至是故復名月愛三昧案僧亮曰七子之中一子遇病譬凡夫六子譬六住慈本緣苦苦重則慈重初住已離三塗六住則永離人天佛則放捨慈也智秀曰第二翻正列放光滅其身苦事也王語耆婆我聞如來至當有何心往見如來案僧亮曰雖蒙遠光身病得除聞此經語懼不敢往也將無陷入地者若違經見佛恐交致此苦也我觀如來者向引經語此以情推也僧宗曰雖蒙光照猶以善惡事隔且慚愧在顏不欲去也耆婆答言大王譬如渴人至而當不蒙慈悲救濟案僧亮曰為闡提說法者以重況輕證必濟也兼非王所引之經若果尚為闡提說法云何不與惡人坐起耶王言耆婆我昔曾聞至何故如來而為說法案僧亮曰如來言不虛設云何乃為闡提說法必不然也寶亮曰耆婆申佛意傍為說法尚為闡提說法況王非闡提耶智秀曰第三王雖蒙光心猶未達請耆婆為決耆婆答言大王譬如有人至語彼醫言速疾上車案僧宗曰此下第六說譬以慰王勸令去寶亮曰為闡提說法凡有三意如醫治病人一為除現苦二遣眷屬橫苦三息外人誹謗合譬如此可知也爾時良醫即自思惟至如是病者必死不疑案僧亮曰譬如來為闡提說法如醫審知病者必死不得不說法一為病人二為親族諸佛亦爾不得不說也大王世尊亦爾於一闡提輩至為一闡提而演說法案僧亮曰明闡提說法有二利不虛前去凡夫誹謗後明利益闡提顯說法不空也譬如淨人者喻未來善根也王語耆婆若使如來至得道之人不入地獄案僧亮曰冀汝捉持者懼犯罪增生入地獄也智秀曰第七始從耆婆勸命駕至佛所去也僧宗曰第四翻聞法之機發也
