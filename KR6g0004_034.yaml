body:
  text: 破外道所執義釋更轉法輪義聖行品之第八復次善男子諸行無我至以是義故定知無我案僧宗曰專念憶想是證常家第三第四事也常即自在所以兼破復次善男子若諸外道至如來如是真實有我案僧亮曰計我之六事也諸根和合是假名我假名但名家稱名也復次善男子若諸外道至以是義故定知無我案僧亮曰通破第一第二事先以口涎破第四事也善男子是諸外道癡如小兒至有真實諦非於外道案僧亮曰我名本在佛地也外道不識得少許分故妄計諸行為我如生盲不見色說色語之唯以已之所解為色終不得色之相文殊師利白佛言世尊至乃作如是分別真諦案僧亮曰四諦二諦昔來凡是廣說顯示應迹似乖將欲會之故也法瑤曰聞上廣說四諦真實之義歎今說實諦於昔鹿苑為更轉也僧宗曰三重明慧窮理盡性聖行已畢迦葉取時衆之心假為不達因以盡疑也寶亮曰一品之中第四遣執明慧也若於緣中虛心屬法則成智慧用也文殊一問成有三過一謂如來實涅槃二云佛作心轉法輪三謂更轉也佛告文殊師利汝今云何至常住不變不般涅槃案僧亮曰轉法輪者謂所說之法令聽悟解為轉也解以摧惑為輪也若佛有說則是有為有盡何名涅槃今無說而物聞不滅而人自滅故言不涅槃也僧宗曰疑有三意此釋第一意也善男子若有計我是佛至如來方便轉於法輪案僧亮曰此下釋不轉有二意一以不轉說轉二就迹應有轉也此第一意不轉說轉也僧宗曰釋不轉有三重第一極處無轉第二應故有轉第三顯極處相如虛空也善男子譬如因眼緣色緣明至非諸聲聞緣覺所知案僧宗曰第二明有轉之義緣有應接之因也善男子虛空非生非出至非作非造非有為法案僧宗曰第三明極地無心於轉如彼虛空也善男子諸佛世尊語有二種至為諸菩薩說出世語案僧亮曰第四明昔小今大不應言更若以益物為更者四十九年已來未始不益不應今日方云更也僧宗曰此下釋無更義有九重也此即第一明教異謂昔淺而今深也善男子是諸大衆復有二種至為諸菩薩轉大法輪案僧宗曰第二明乘異昔為求小者故說今為求大者說復次善男子復有二人至極下根者即一闡提案僧宗曰第三明根異昔為中根者說今為上根者說也復次善男子求佛道者至為上精進轉大法輪案僧宗曰第四明精進異昔為中精進今為上精進說也復次善男子我昔於彼至阿耨多羅三藐三菩提案僧宗曰第五明得道異昔八萬天人悟須陀洹果今八十萬億人不退轉三菩提也復次善男子波羅捺城至稽首請我轉大法輪案僧宗曰第六明請主異昔日梵王今日迦葉復次善男子我昔於彼至如實演說常樂我淨案僧宗曰第七所明理異昔說無常今說常也復次善男子我昔於彼至四維上下亦復如是案僧宗曰第八聲之所聞遠近異昔止梵天今徹十方草恆沙世界之也復次善男子諸佛世尊至皆悉名為轉法輪也案僧宗曰第九明自出世已來未曾不轉法輪今亦何更之有耶善男子譬如聖王所有輪寶至大涅槃經所行聖行案僧宗曰歎法輪也迦葉菩薩白佛言世尊至則能奉行故名聖行案僧亮曰上已說戒定慧通菩薩得稱聖行未知究竟實諦通學地以不是故問也聖名諸佛世尊者夫究竟實諦得稱聖行唯佛世尊也法瑤曰此下為明聖不為明行上來明戒定慧是聖人之所行非明聖也聖者正也如來始當其位故說佛說聖義也今但合行說耳旨不在行也僧宗曰上明戒中已結聖名今辨三法既竟復總結聖行寶亮曰第五段結果也善男子是菩薩摩訶薩至是故此地名無所畏案僧亮曰前三是因後四是果慧能斷因果故總說地德也亦不畏三惡道者除惡已漸故次說之此三麁故先除也惡有二種者此善趣中惡也不畏受二十五有者無如上惡能斷二十五有也法瑤曰得上戒定慧行則入此初住地也離五怖畏故曰無畏地也畏貪恚病死等者即不死不活畏也闡提等者離惡名畏也不畏三惡道無惡道畏也不畏沙門乃至波旬無大衆畏也前不動地是入初地之始也堪忍地是初地之中此無畏地是初地之終亦可七住七住三界結盡始無三畏之畏也僧宗曰無畏地者七地也前結戒果云初不動地次結定果云第三堪忍地今結慧果指第七地也所以爾者示行有淺深結果亦異言無畏為七地依常釋七地為遠行地今乃云無畏者謂不畏三界果報故偏稱也寶亮曰無畏果者亦同是初地明慧是解性不存緣而照既具有無分別之知故結之以無畏也第一無不活畏以菩薩達萬法相空不假資生豈畏不活以不畏故則不生三毒故無不活畏也第二無三惡道畏也第三無惡名畏第四無大衆威德畏第五無生死畏大士不畏受二十五有生死善男子菩薩摩訶薩至所有功德而當可說案僧亮曰智能除結非定不成是以因定說智也若欲吹壞須彌山王乃至碎身之苦者地有二果一滅惡二神通兩說其名也所以然者上說斷有或者便謂不得入有為化更出自在之事以表地名釋其疑也僧宗曰此言漸進向八地也向七地已不畏惡道果報而未免二十五有者就七地自有餘報身者今八地以上一向法身故言二十五有也三昧非慧因定生慧共相資成也所以知八地者言具二十五三昧能為種種神通尋神通之用非近行所為也寶亮曰第六段也若通作結果段者猶屬前文第五段直結果在初地既發初住得無漏正解後方進修萬行得二十五三昧斷二十五有結得八地以上自在果若就此義而分則成第六也此二十五三昧就勝處受名一一皆攝於衆故名三昧中之王也
