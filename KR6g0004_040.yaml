body:
  text: 辨世間所不知見覺菩薩知見覺廣辨菩薩修戒相廣誡弘通法者之軌則廣釋六念第一辨十號釋婆伽婆等梵行品之第五迦葉菩薩言如佛世尊至不名世間不名非世間案僧亮曰不名世間者不名佛法中在家人也不名非世間者不名信根以上人也爾時迦葉聞是事已至衆生聞祕藏即得不生滅案僧亮曰説地能已説梵行粗竟此歎佛也初偈明佛善説正道稱為醫王次偈釋醫王義備治所治畢竟不發也次偈與法設譬後偈説法體智秀曰將欲咨前義旨故第五先以偈歎佛及經教迦葉菩薩説是偈已至若非世間有何異相案僧亮曰此下説經之能也依經修行速得出世如聖行品末功德藏王所説也寶亮曰此下廣料簡知見覺人也故迦葉因難以啓發耳智秀曰此訖六念第六段辨菩薩世出世異有三意第一約戒定慧第二約法師儀軌第三約六念法明其同異佛言善男子言菩薩者至亦同世間不知見覺案僧亮曰大判菩薩有二種有世間者有出世間者若當持戒清淨心固不動終得發定生慧知九十六種道所計者非知佛法所明理者是也是信用修行斷二邊盡屬知見人也問此是何處人是信首五根以上此人永與生死為隔無復入三塗之憂名作出世間菩薩也若信心不立持戒不淨雖復見涅槃經信心受持不識九十六種所計者非佛法所明者是此名作四念處前人是世間菩薩還結屬不知見覺人數也此下去凡有三重文來料簡初就信慧心中成就不成就來簡向所解者即為第一重也第二就弘法人中料簡若是惡世中持清淨不生誹謗識知九十六種道所計者非驗佛法所計者此是出世間菩薩落知見覺人位也若當雖復惡世弘通此經持戒不清淨又生物誹謗復不識知內外是非此名世間菩薩屬不知見覺人流也第三就六念來簡若依涅槃經作六念處成就知內外是非者名出世間菩薩是知見覺人若使作六念不成就由依昔教學復不識知內外是非名作世間菩薩不知見覺者也菩薩聞是涅槃經已至是名菩薩修持淨戒案僧亮曰知有佛性能得常果而發心者雖徑生死不失此念經之能也僧宗曰第三翻明道雖不無要須戒定慧戒既清淨次修禪定至是名菩薩修清淨定案僧亮曰聞思慧得非修慧也明能修二慧是淨定也戒定已備次修淨慧至所知見覺非世間也案僧亮曰身中有我則身大我小我中有身則身小我大是身是我雖小大皆是非身非我兩無也慧能斷結先斷於常窂固不動者諸見是犯戒之本見盡戒不動也善男子菩薩見所持戒至而是菩薩所知見覺案僧亮曰上説不悔由戒而生未釋相生之義此釋相生者也迦葉復言云何菩薩至以淨戒故心得歡喜案僧亮曰不因涅槃經持戒是世間戒則具四惡不見佛性出世也善男子如端正人自見面貌至破戒之人亦復如是案僧亮曰面譬淨戒鏡譬毗尼此雖無鏡餘經有也善男子譬如牧牛有二女人至以是因緣心則悅樂案僧亮曰上譬一生中有喜有不喜此譬命終時也牛譬經教牧女譬行者瓶譬人身酪譬破戒酹譬持戒城譬涅槃經腳跌譬無常瓶破譬命終蘇已出外漿不足惜譬持戒人身利己出餘不足顧喻歡喜也蘇在酪中與瓶俱失譬破戒人身利未出與身俱喪喻可愁惱也迦葉復言喜之與樂至而是菩薩所知見覺案僧亮曰五法佐助重釋淨戒所以為涅槃因由得慧等佐助離五蓋故生五種涅槃釋所以具信等五法推功於慧能離蓋及見疑故具五根者得五解脫也善男子若我弟子受持讀誦至不以毀戒受持修集案僧亮曰説五種持經以明出世何者餘經所説未究竟故不備持之行惡令人謗經持經起惡雖能自利不能利人非出世菩薩是以佛但令出世持經應究行之義善男子若我弟子受持讀誦至非我弟子是魔眷屬案僧亮曰無有實功是名掉戲若轉諸有名輕動也復次善男子若我弟子至非我弟子是魔眷屬案僧亮曰悟時未至名非時也處不應聞名非國也不如上誡是滅佛法説佛法滅世法熾燃善男子若欲受持者至而是菩薩所知見覺案僧亮曰此經所説理無不備説此經時應具諸説復次善男子云何復名至念僧念戒念施念天案僧亮曰上説出家菩薩六念則通在家除生死畏修六念人不畏海難貪寶重貨菩薩不畏生死苦難貪三寶功德也畏死者懼三塗念戒施天却死畏也是始行所修非出世功德也若依此經修之即出世知見美經之能也僧宗曰第五明六念者向明戒定慧今舉境以顯慧之功也寶亮曰若作六念成名出世間菩薩是知見覺人若不如是不名世間知見覺人也善男子云何念佛至説中道故名大法師案僧亮曰此經辨十號有正有雜有略有廣從如來至大法師此初廣後十號略也亦可前正後雜也寶亮曰念佛中有三翻第一總舉佛果一切功德第二歷十號第三舉成佛之因佛昔修六度衆德今得常住萬境皆照也下五念皆真應雙明但文中可見不假有釋也云何名如來如過去諸佛至是故號佛為如來也案僧亮曰如者如佛也來者乘因至果也此果中説如來也從六波羅蜜者因中説如來也云何為應世間之法至而供養之故名為應案僧亮曰惡應除善應集具二德故應供養也云何正遍知正者名不顛倒至聲聞緣覺無有遍知案僧亮曰以知因為正知果為遍也云何明行足明者名得無量至以是義故名明行足案僧亮曰空行雖非照解而非垢暗也云何善逝善者名高至成大涅槃故名善逝案僧亮曰涅槃之性實非有者生住滅是有為相涅槃無此故非有也云何世間解世間者至見世間故故名世間解案僧亮曰因世間言説為有者非有説有以明非有云何無上士上士者至是故號佛為無上士案僧亮曰有惡未盡智與心諍智勝心故為上也語可壞者有諍則可壞云何調御丈夫自既丈夫至是故號佛調御丈夫案僧亮曰應以男形成佛名丈夫也釋上句具足法者釋下句也後調御丈夫凡四種應深説深應淺説淺明善調也云何天人師師有二種至是故號佛為天人師案僧亮曰師有二種者釋上無上師也亦次解人天二義明能受道也云何為佛佛者名覺至常得不離見佛世尊案僧亮曰一周明十號也善男子何故名為如來至八十種好金剛之身案僧亮曰重舉果稱以説因者欲令欣果而行因也再説因者前略後廣也又復菩薩於昔無量至是名菩薩摩訶薩念佛案僧亮曰生住是有為自在是無為修五十心成此果心也
