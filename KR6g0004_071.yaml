body:
  text: 梵志名淨第六犢子梵志第七納衣梵志第八弘廣婆羅門第九阿難為魔所嬈事説阿難初為侍者緣起為須跋陀説法憍陳如品下復有梵志名曰清淨至乃至非如去非不如去案僧亮曰聞常無常並是倒不知倒之所由故問也寶亮曰論義更無所執直捉六十二見來問也佛即為説所以離六十二見之方於是而悟羅漢道梵志言瞿曇衆生知何法故至是人能知常與無常案僧亮曰知何法者已知病起次問滅病之方梵志言世尊我已知解至諸漏永盡得阿羅漢果案僧亮曰因在先名故也果在後名新也犢子梵志復作是言至彼若問者當隨意答案僧亮曰犢子以所見問佛欲觀其同異耳外道所見不同或説無善惡果報或説有善惡無道或説有道不修得或説男得女不得或説出家得在家不得或説離欲得在欲不得二問也寶亮曰亦無定執也佛所以默者欲申己之迹非置答之謂也佛言犢子善哉善哉至平等雨於優婆塞優婆夷案僧亮曰三種善不善及十種善不善者三是出世十通世間也寶亮曰佛今答起三善離十惡終斷一切障成聖道也世尊若諸外道欲來出家至還其尸所大設供養案僧亮曰四月試者外道本異見假服偷法皆四月試如其不爾不必試也寶亮曰如優婆塞戒經云六月試蓋隨機故有此法耳而犢子出家於十五日後方得初果者感應之道其事不同著於此也納衣梵志復作是言至善不善身是義不然案僧亮曰説無因果所以作闡提者以其謂善惡有性不從因緣非無善惡故也寶亮曰尋衆生之始無源故謂善惡皆自然也何以故如瞿曇説因煩惱故至皆有自性不從因緣案僧亮曰第一事謂先後皆不可一時以身類一切法皆無因也寶亮曰先作三關難第一定煩惱舉身之先後也復次瞿曇堅是地性至自性故有非因緣生案僧亮曰第二以空類五大以五大類一切也寶亮曰下舉七事證義也此第一事證各有自性也復次瞿曇世間之法至云何説言從於因緣案僧亮曰第三如木不由善惡而性有曲直之用五道性有善惡隨生處而得名也寶亮曰第二證以用有定故無因緣復次瞿曇一切衆生至一切法中各有自性案僧亮曰第四以類求物各有性也寶亮曰第三證也復次瞿曇如瞿曇説至生一切法以自性故案僧亮曰第五以五塵非貪之因貪瞋自生也寶亮曰第四事也復次瞿曇我見世人至各有自性不由因緣案僧亮曰第六謂若有因不應一同而得苦樂二果也寶亮曰第五事也復次瞿曇世間小兒至一切諸法各有自性案僧亮曰第七謂憂喜無因也寶亮曰第六事復次瞿曇世法有二至有自性故不從因緣案僧亮曰第八是故外計虛空有用有名莬角無用無名也寶亮曰第七事也七事悉是證自然耳佛言善男子如汝所言至同五大者無有是處案僧亮曰先破第二明諸大無常故無性也寶亮曰若使萬法從五大者萬法無常五大亦應無常也善男子汝言用處定故至説一切法有自性也案僧亮曰答第三也若名義有因實亦有因也寶亮曰答第二也明竹木初生本無箭槊之性工匠乃成豈非因緣耶善男子汝言如龜陸生至無有自性無有一性案僧亮曰答第四也明龜若無緣亦可入火也寶亮曰答第三證皆由行業豈得無緣耶善男子汝言身為在先至何因緣故而作是難案僧亮曰答第一難也汝性亦無前後而我因緣亦無先後云何為難也寶亮曰破三證竟答其上所執也且一往總非明不應為難也善男子一切衆生身及煩惱至皆從因緣無有自性案僧亮曰汝有一時而無因果我緣有一時而有因果也如炷之與明以下若不見身因便言無因者汝亦不見瓶因不應説泥是瓶因也寶亮曰正答也云身及煩惱一時而有此言似不關衆生之始也正應是捉十二因緣中識枝時語也夫受生為體要須備起潤業潤生若但有潤業無潤生愛則不為結報故識支之起雖由潤業若不更起潤生則報不相續于時身與煩惱得言一時而有雖復一時要因煩惱而有身也若言身不在先知無因者現見瓶等不無因緣也善男子若言一切法至亦應如是精勤持戒案僧亮曰謂汝法能生名大若無因緣不應説大也寶亮曰身先因緣亦同此也善男子汝言五大有定堅性至故不得説自性故堅案僧亮曰此等有香香屬地故也寶亮曰重破初證也彼以蘇為地而有時同水豈有自性耶善男子白鑞鉛錫銅鐵金銀至云何説言定名火性案僧亮曰此有明色色屬火也寶亮曰火不定以流時水性動時風性熱時火性堅時地性亦非自性也善男子水性名流若水凍時至從因緣見非無因緣案僧亮曰是堅守性故名為水然流動性同若動不失流守性不名為風耶若動不名風以下若濕多屬水凍時堅多應屬地也豈是從緣得名乎寶亮曰若凍時猶屬水者波本因風而動應名波為風若不名波為風亦不應凍為水也善男子汝言非因五塵生貪至生貪解脫無有是處案僧亮曰答第五難非因者正因也貪有二因者覺觀是內因六塵是外因因內生外善男子汝言具足諸根至無有自性皆從因緣案僧亮曰答第六難有好施而貧慳貪而富應與諸根同難故先答後業果正答根具大富修時不兼受報則別耳善男子如汝所言世間小兒至是身因緣煩惱與業案僧亮曰答第七難若笑是自性則應常笑如火體熱則常熱也不答第八虛空菟角皆置答也梵志言世尊如其是身至除三界煩惱得阿羅漢果案僧亮曰還請佛為説身因聞即悟也復有婆羅門名曰弘廣至能發無上廣大之心案僧亮曰弘廣晦迹引諸無知應弘此經時將顯迹現所聞不遠也寶亮曰更無所執直作心念試佛佛即知其所念復過己心所見於是即伏故憍陳如先難己所為佛即顯其迹也佛言止止憍陳如至汝今能發如是大心案僧亮曰入則入涅槃出則出生死也爾時世尊知已即告憍陳如至阿難比丘今為所在案僧亮曰經之流通有二人自上弘廣所持須跋以下應付囑阿難也後文似爾亦可理付弘廣而文付阿難寶亮曰此下去正顯流通之意也問阿難所在有三緣一欲顯阿難有八不思議之德二為流通經三為名須跋故憍陳如言世尊阿難比丘至不來至此大衆之中案僧亮曰魔欲使佛法無所付囑滅不流傳故惱亂阿難也寶亮曰所以是表阿難之德雖不在坐而能受持爾時文殊師利菩薩摩訶薩至問憍陳如阿難所在案僧亮曰欲顯阿難德故所以發問爾時世尊告文殊師利至若佛聽者謂往給侍案僧亮曰明阿難有二事一是親屬人所敬信二受持佛語無有漏失也文殊師利阿難事我至八者具足從聞生智案僧亮曰敘阿難有三意第一敘進止所為有八不思議之德必堪弘通第二引證明七佛弟子有八德者皆通使流通第三正釋文殊問文殊師利毗婆尸佛侍者至阿難比丘為多聞藏案僧亮曰第二引七佛為例也善男子如汝所説此大衆中至阿難所聞自能宣通案僧亮曰第三正答問也文殊師利阿難比丘至至心禮敬却住一面案寶亮曰時將欲至命文殊以呪解魔召阿難還也佛告阿難是娑羅林外至與須跋陀還至佛所案僧亮曰習未盡者乃伏欲界結未伏習也時須跋陀到已問訊至即得涅槃是義云何案僧亮曰慢人不欲自受屈故假稱外明得失在彼不在於我也寶亮曰須跋所執現在苦樂盡是過去不因現在故受投巖赴火令苦盡也佛言善男子有沙門至是故我今責汝過去業案僧亮曰恐傳者之謬所定也彼人若言瞿曇我實不知至唯過去業非現在耶案僧亮曰下苦因緣得中上苦不者問得展轉用不耶若言得者是則不定云何定言斷過去業耶復應問言是現在苦至過去已盡云何有苦案僧亮曰若過去有苦應與業俱盡不應重受也寶亮曰若現在苦行能斷過去業者此苦行業復用何斷耶仁者如是苦行能令樂業至是事不然何以故仁者案僧亮曰次問轉無苦樂四禪以上業無漏無報何因緣受是苦行者既不能壞又不能轉何故受耶譬如有人為王除怨至過去本業受苦樂也案僧亮曰證有現報也不必盡因過去業也仁者若以斷業因緣力故至心喻於林身喻於樹案僧亮曰償不可畢遮則不受也若以受苦為償者畜生應得道也先當調心者身喻於樹林多而樹少四陰譬林色陰譬樹怖從心生不從色也須跋陀言世尊我已先調伏至受於惡身況其餘者案寶亮曰佛呵之已能除麁想何不血除細想耶世尊云何能斷一切諸有至上智觀故得無上菩提案僧亮曰有假空實空而外道伏結緣有不緣空緣空是實想也寶亮曰唯有二諦忘相為實想實以慧斷煩惱作想名説此其旨也説是法時十千菩薩至須跋陀羅得阿羅漢果案寶亮曰得一生實想者正一生後得佛也若是無明住地報則不可以一生二生往格也乃約應而辨耳若尋餘經比例便是未盡此土無緣亦以不悉來也觀應二年辛卯卯月十日於大和州大御輪寺點寫之了自觀應元年九月二十四日至同二年四月十日一部七十一卷為每年講讚本一筆點之了偏為奉助興正菩薩御願而已大御輪寺金剛資圓宗生年六十五度以四十五
