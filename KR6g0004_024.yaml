body:
  text: 釋本有今無偈釋世若無佛非無二乘得二涅槃義釋栴陀羅得受記義出佛自受純陀供以化佛受大衆供事佛説十三偈謂假使烏鴟同一樹義菩薩品之第三爾時文殊師利白佛言至重為分別令得除斷案僧亮曰次答三乘若無性云何而得説也上再説因果經體已同屢勸修行而未明修法將説五行而是修本更以十問釋疑勸信所以然者經之因果理致幽遠純陀先知時衆猶故有疑文殊知疑而不能決更以事問也疑謂從緣得法皆是無性三乘成果皆從緣得若佛是常二乘亦常二乘無常佛亦無常故云無差別也若二乘是常者云何樂實未生而名為受樂耶僧宗曰從此訖最勝無上道悉為廣歎也經之為益不出因果前七問中四問因益三問果益一周明義因果兩益竟於前文此下文殊騰純陀疑以為廣歎以得解者由此經也寶亮曰純陀所疑與迦葉所問意同而辭異也佛言善男子云何疑心至聲聞緣覺無有差別案法瑤曰上明三寶有時而盛有時而衰似非常住致生疑惑是以純陀示同有疑文殊申述扣發大聖也將顯三乘佛性同歸一致是以三寶可得而不滅如其不爾是則三乘無性豈同湛然也僧宗曰疑謂本無今有無常法如來既是本無今有就事而求應是無常而開宗言常是故疑也又迦葉上問三乘無性便是應無如其有性則應見用二大士之言辭異旨同佛下引偈以答兩家爾時世尊即説偈言至亦有差別亦無差別案僧亮曰本有今無者本有煩惱而無涅槃也本無今有者本無般若而有煩惱也若謂佛三世皆有煩惱者無有是處也是故緣雖同而所以為異也有煩惱故無常無煩惱故有常迦葉菩薩白佛言世尊至利益安樂一切衆生案僧亮曰迦葉為請法之主以上義隱須明問以廣之也佛言善男子諦聽諦聽至業報因緣令乳色一案僧亮曰長者譬先佛也牛譬行人色異譬三乘也一人譬今佛也三乘成佛報先佛之恩如祠祀也得大涅槃一器也色白譬我樂淨也尋便驚怪至皆同一色將釋所由假為驚辭怪因異而果一也是人思惟者謂八萬行因果不應異也善男子聲聞緣覺菩薩亦爾至所以者何同盡漏故案僧亮曰合前而乳色一而諸衆生言佛菩薩至解悟乳相由業因緣案僧亮曰合先怪而後悟復次善男子譬如金礦至以斷無量億煩惱故案法瑤曰前譬明緣因佛性同耳此明正因果佛性也明三乘同有此性修道斷結陶冶成佛此理非是本有今無本無今有也迦葉菩薩白佛言世尊至如是説者多有過咎案僧亮曰將問差別先難無差謂因亦是有果亦是有有義不異有何差別衆生有性似如已有致此難也若諸衆生皆有佛性至如來涅槃而不般涅槃案僧亮曰謂若是先有得便應同不應有異也善男子諸佛世尊所得涅槃至大般涅槃名為善有案僧亮曰唯佛乃得故非先有也若非先有則二難俱釋也名為有者有為不善也三事無為名為善有也世若無佛非無二乘至出現於世開示三乘案僧亮曰唯佛具善有耳非佛得者非善有也乃有一佛者善有難成曠劫乃就也開示三乘者三非實有非先究竟也法瑤曰此明二乘不得涅槃義也涅槃若極菩薩近之無佛之世尚無得者況二乘耶而云二乘得者是不實也僧宗曰根有大小悉有廣狹世無大心衆生為説常果令作佛者非無權説二乘得二滅也以其志小權説引接得知虛果未極何容責使同佛涅槃耶又釋若世間都無作佛理者非無二乘得二涅槃理既不爾故知二乘權設小果何得同佛耶無量劫乃有佛出者釋上句也謂圓解難固常倒易生無善感佛不得恆現善機希有所以時一出世背化失機動經劫數云何説大耶致教唯以三乘級引故知小果權施而非實也善男子如汝所言菩薩二乘至是故名為大般涅槃案僧亮曰上已總答更引昔説別答前難昔説伊字之譬及解脫是色而聲聞非色已説三事善有之義也迦葉言如佛説者我今始知至亦有差別亦無差別案僧亮曰稱佛二説而領解也迦葉言云何性差別至雜諸煩惱亦如是案僧亮曰上已説佛及二乘有異未説人人各異故重問也聲聞如乳者因有遠近聲聞菩薩於佛亦爾也迦葉復言拘尸那城至目楗連等速成佛道案僧亮曰上説聲聞凡夫因有近遠而歡喜旃陀羅在千佛數中而不説聲聞是則因近而更遠何耶佛言善男子或有聲聞至以發速願故與速記案僧亮曰行有內外偏行者遲遍行者速而聲聞偏行外行也所以然者先有小心須偏行以去之凡夫不爾是故速也復次善男子譬如商人至護正法者為授遠記案僧亮曰此下説凡夫知聲聞志小自輕己行若與速記必有深失下合譬中説其事也商人譬佛珠譬得記之行也市賣者譬授記之辭也頗梨珠者譬生死行也迦葉菩薩復白佛言至所得眷屬不可沮壞案僧亮曰次答云何諸菩薩而得不壞衆也因上聲聞護法莊嚴眷屬眷屬是佛外果即以外果勸進也迦葉菩薩復白佛言至以是義故名為肉眼案僧亮曰答云何為生盲而作眼目導也次以內果勸信若不識常果不知身是常因對因不見名生盲也下不知手足等事名為無眼者常是未能見之者是障外之事名無眼者也復次善男子如來常為至以是義故名為父母案僧亮曰次答云何示多頭唯願大仙説也以説勸信謂説者是佛佛有大慈是衆生父母之言不可不信也所以者何以下一音所説各各得解證慈也復次善男子如人生子至而為衆生嘆説妙法案僧亮曰次答云何説法者增長如月初初説無常後則説常似如欺人不慈衆生非父母義明不正也故以父母教嬰兒為譬也大衆問品第十七案僧亮曰事已究竟佛欲涅槃大衆請佛以為品名次答云何復示現究竟於涅槃也下訖猗臥五事是現涅槃義也前後各一事寄不食不病證佛不滅而應滅以顯涅槃是示現也中間開三事示一切事訖也知佛常住明現在化訖也説有餘無餘未來教訖也為文殊等受記菩薩事訖也五種究竟故現滅也法瑤曰上增長如月初者先明淺近無常之説也此言其終極常樂教言示現者明實不滅顯常住之義也僧宗曰答第二十六問也亦名隨喜品下文大衆聞佛説常咸皆隨喜又云純陀成道我亦隨喜也偈前長行末是答問也偈中明不滅示現之義乃顯也爾時世尊從其面門至充滿具足持至佛前案僧宗曰意在催供也寶亮曰古佛道法過中不餐其時既至不容發言故放光以顯意也智秀曰此下長行中有十事此即第一是經家述純陀蒙光即知其事起辦供也爾時有大威德天人至前至佛所奉其所施案僧亮曰光明重催知供時必至所以感而從也智秀曰第二事也爾時天人及諸衆生至聽諸比丘受此供養案僧亮曰佛已不受不敢復請故仰悕大悲聽諸比丘受也智秀曰第三事也時諸比丘知是時故至如西方安樂國土案智秀曰第四經家述諸比丘亦知時而起也爾時純陀住於佛前至最後具足檀波羅蜜案智秀曰第五重請佛住爾時一切菩薩摩訶薩至所設供具則為唐捐案智秀曰第六慶純陀也爾時世尊欲令一切至自受純陀所奉設者案僧亮曰化佛不食表釋迦亦然以顯不滅而現滅也自受純陀所設者為應見者有此説耳非定爾也僧宗曰法身無像應化何殊自受純陀者示請主有人顯彼無宿願之異耳智秀曰第七事也爾時純陀所持粳糧至一切大衆亦復如是案智秀曰第八事敘純陀與大衆願遂一切歡喜也爾時大衆承佛聖旨至所食之物亦無差別案智秀曰第九事敘大衆承佛旨故能有涅槃之念是時天人阿修羅等至無上調御盲無眼目案智秀曰第十事向敘懷念今述發言也爾時世尊為欲安慰至此則是諸佛最上之誓願案僧宗曰此中説十三偈無指的文也正應各除前後四偈取中央偈也大意明佛法身圓極應而不滅也前四偈一往慰喻後四偈令其安心有在不應愁惱即是答上示現究竟涅槃義也上言示現明如來久已成佛入伊字圓德涅槃説此妙義令大衆開解即示現又一義既妙本不滅是則應迹無時不化但一應不現亦言滅也寶亮曰唱有十三偈誓唯十二不知所以而然也或是偈之零落不爾者十三字誤應為十二也智秀曰偈中分為四階第一有一行半明久能現入涅槃其實長存也第二次有一行明得涅槃故久無飢渴之苦也第三次有十四行半廣舉諸譬明今非實滅示現滅也即此十四行中復有三意前一行半勸也中十二行正顯偈旨也最後一行結勸意也第四有四行舉三寶長存明涅槃相也有三意初兩行勸次一行舉三寶勸求常果也後一行舉諸佛誓願結成所以勸意也若有比丘比丘尼至觀了三寶常者是栴陀羅案曇纖曰次答問云何勇進者示人天魔道也明若能隨佛發前誓願是即天道不解一體三寶常樂我淨是名魔道栴陀羅者即是殺者魔之異辭也若有能知三寶常住至無有嬈害能留難者案智秀曰次答云何知法性而受於法樂也明三寶是真法性有能知者則永受安樂也爾時人天大衆阿修羅等至鼓天伎樂以供養佛案僧亮曰以此答云何知法性受於法樂也時會知佛常住是知法性受安樂也謂現在化道已訖應現滅也爾時佛告迦葉菩薩言至皆知如來是常住法案僧亮曰欲令人説異見顯如來密力皆是知法性受樂之事也有兩翻此第一先問迦葉也寶亮曰就迦葉答中五事第一見諸佛甚多第二見所坐甚小而能容也第三見大衆各隨佛説十三偈第四見大衆各心念言唯我獨得供養釋迦第五見純陀之供雖復鮮少而足大衆也爾時世尊告純陀言至摩訶薩等之所圍繞案寶亮曰純陀自見一事并前合為六事也此明現在事畢從得道已來所化可利益有緣得益者訖於此矣佛告純陀汝先所見至菩薩所行具足成辦案寶亮曰上已廣略兩重明常復答二十餘問竟乃結果云純陀住十住地所作成辦當知理教可徵也何應指説陀羅尼呪而頓有六萬四千人得無生忍者故知昔教定是方便今教定是真實若昔純不數以方便唱云有人得道者則下愚入道之心不勤迦葉菩薩白佛言世尊至説是大乘大涅槃經案僧亮曰追答第二十七問明未來事訖為開邪正兩門十惡為魔道十善為天道使改惡行善故言未來事訖也
