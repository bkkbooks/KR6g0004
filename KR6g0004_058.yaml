body:
  text: 廣出俱尸城緣起廣出俱尸城涅槃緣起廣出須達緣起廣出逐外道緣起師子吼品之第五師子吼言世尊十六大國至拘尸那城入般涅槃案僧亮曰衆生有待處漏盡此下將辨處為道故發問也寶亮曰修道之第四文人寄處所以明道也大意有五因緣第一為益人曠遠第二欲報地往恩第三為欲還此中正受第四為果彼本願第五為逐外道也善男子汝不應言拘尸那城至邊地弊惡隘陋小城案僧亮曰先答不應謂此為隘陋也善男子我念往昔過恆沙劫至我眷屬者受恩能報案僧亮曰明此是初發心處故在此也寶亮曰第二報地恩也復次善男子往昔衆生至娑羅樹間三昧正受案僧亮曰明此是往昔出家修道之處也寶亮曰第三欲還此中三昧正受故也善男子我念往昔過無量劫至敷揚演説大涅槃經案僧亮曰明此是發願之處也寶亮曰第四果本願也善男子我初出家未得阿耨至我時默然已受彼請案僧亮曰為洴沙王有請故所以來此也善男子我初得阿耨多羅至我即往彼受王供養案僧亮曰此下皆為逐外道故次第至此外道於此必受化故故來此也寶亮曰第五為逐外道兼先受此受故也外道六師相與集聚至我時受已即住其中案僧亮曰因出須達所起祇洹精舍事也是時六師心生嫉妬悉共集詣波斯匿王案僧亮曰此下廣説外道之辭也作如是言大王當知至六師之徒歡喜而出案僧亮曰王知有益是故許之時波斯匿王即敕嚴駕至阿耨多羅三藐三菩提心案僧亮曰外道雖復未降而所益已多也是時六師各相謂言至阿耨多羅三藐三菩提心案僧亮曰隨其所至略已遍也
