body:
  text: 明慈悲有實益廣明慈心中布施發願事廣明菩薩所修之慈即萬行廣明慈益象見師子力士移石盧至長者斯那大多女人及提婆達多憍薩羅賊流離太子梵行品之第二迦葉菩薩白佛言世尊至如是之觀非虛妄耶案僧亮曰第三門明四等是實行也難有兩意此以虛行為難也僧宗曰難有三重此初重云衆生在苦不蒙救拔證慈非實也寶亮曰此下大段之第三也明慈是實行將辨此理故迦葉先作虛妄之難也此中凡六翻此下第一釋慈體是實行迦葉引五事證其無實之難也世尊若非虛妄實與樂者至威德力故一切受樂案僧宗曰第二重難如其必益是則衆生必應離苦也若當真實不得樂者至云何得與此義相應案僧亮曰此第二難明虛行不應得實報也僧宗曰第三重難以果驗因二事相違虛實未辨請求解釋也佛言善哉善哉善男子至諸佛菩薩真實不虛案僧亮曰初偈説世間慈也行人以施是實行故以施福修世間慈不及其一況出世間也何者雖慈一人與世之樂施不得爾升降可知矣僧宗曰就此明慈有實益門中有五翻為證也初明修慈實能轉境第二明慈能斷煩惱第三明慈為萬善根本第四明慈即萬行第五引果地之慈證真實不虛也佛是窮慈之極得知因地亦有實益也雖可有此五翻若欲對向三問者此五翻悉證慈有實益並答初問下當更題第二問出別答也此偈言慈之功用乃於諸行為勝豈但實益而已不可以聲聞是虛令菩薩益虛也二問既釋則第三問自然釋矣寶亮曰佛將答難先歎之也偈明實益格量功德何者有人止於一人邊興慈欲與其樂始終必得出生死也答人雖復供養無量五通神仙以為福田不如於一人邊起慈十六分中之一也供養仙人乃得生死之報若拔一人苦實獲出世之利也又化無量人得出於生死當知慈是實也釋慈有實益之義文齊於此云何知耶善男子菩薩至是實思惟非不真實案僧亮曰五事證慈此第一明能令境雖不實而物得實益如由金得樂土即為金若無金生樂金即為土無異小大相容當事皆實而得其用也復次善男子云何名為至以是故名真實思惟案僧亮曰第二以斷結故知非虛復次善男子菩薩摩訶薩至阿耨多羅三藐三菩提案僧亮曰第三事以慈能生萬善豈得非實耶僧宗曰身被毒箭者謂慳貪箭也眷屬欲令安隱者諸佛菩薩也即命良醫而為拔箭者令諸福田往就乞也且待莫觸者方復優量可施不可施或財物多少時節可不也菩薩亦爾若行施時者合譬也復次善男子菩薩摩訶薩至常應勤發如是誓願案僧宗曰言衣離身一尺六寸者如下經文又曰衣服離身四寸不墮便是一邊四寸四邊為一尺六寸也此則舉其四邊彼乃言其一面耳善男子一切聲聞緣覺菩薩至以是義故實非虛妄案僧亮曰六度是菩薩別行説施一事餘五可知也其餘諸行與三乘共行由佛説故以慈為本也先説人後説法不淨至無我等觀説行相也燸法至見道修道説得果深淺也正勤至八聖道説深淺法之名也四禪至無諍三昧説定名也他心智至佛智説智名也謂皆以慈為本也善男子能為善者名實思惟至如是無量無邊功德案僧亮曰第四事説萬行即慈除苦為慈三乘皆是滅苦要得實者則滅苦也思惟是慈盡苦名乘也迦葉菩薩白佛言世尊至所修慈心為無利益案僧亮曰第五事明慈現有實益故發問佛言善男子菩薩之慈至是實思惟非無利益案僧亮曰有二種必受苦一以不救故二以雖得小樂更增重苦也謂一闡提者夫定受苦報亦非但闡提餘業亦有而其相難辨也受苦不定者謂與樂則得不與則不得也遙見師子者夫不慈之物有遇之者則便生懼大悲之人有逆值者實自然生樂以憑師有在也僧宗曰前有兩關同明慈有實益已遣一關將顯事迹是故迦葉重有前問佛即釋善男子我説是慈有無量至大涅槃經亦不可思議案僧亮曰明法身無緣有感斯應以顯大慈之功無出入異者也
