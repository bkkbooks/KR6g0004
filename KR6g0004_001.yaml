body:
  text: 皇帝為靈味寺釋寶亮法師製義疏序道生法師僧亮法師法瑤法師曇濟法師僧宗法師寶亮法師智秀法師法智法師法安法師曇準法師此十法師經題序今具載略標序中要義八科如左釋名第一辨體第二敘本有第三談絶名第四釋大字第五解經字第六核教意第七判科段第八大般涅槃經義疏序明駿案謹寫皇帝為靈味釋寶亮法師製非言無以寄言言即無言之纍纍言則可以息言言息則諸見競起所以如來乘本願以託生現慈力以應化離文字以設教忘心相以通道欲使珉玉異價涇渭分流制六師而正四倒反八邪而歸一味析世智之角杜異人之口導求珠之心開觀豢之日救燒灼於火宅拯沈溺於浪海故法雨降而燋種受榮慧日升而長夜蒙曉發迦葉之悱憤吐真實之誠言雖復二施等於前五大陳於後卅四問參差異辨方便勸引各隨意答舉要論經不出兩途佛性開其有本之源涅槃明其歸極之宗非因非果不起不作義高萬善事絶百非空空不能測其真際玄玄不能窮其妙門自非德均平等心合無生金牆玉室豈易入哉有青州沙門釋寶亮者氣調爽拔神用俊舉少負苦節長安法忍耆年愈篤倪齒不衰流通先覺孳孳如也後生晚進莫不依仰以天監八年五月八日敕亮撰大涅槃義疏以九月草日訖光表微言讚揚正道連環既解疑網云除條流明悉可得略言朕縱名暇日將欲覽焉聊書數行以為記莂云案道生曰夫真理自然悟亦冥符真則無差悟豈容易不易之體為湛然常照但從迷乖之事未在我耳苟能涉求便反迷歸極歸極得本而似始起始則必終常以之昧若尋其趣乃是我始會之非照今有有不在今則是莫先為大既云大矣所以為常常必滅纍復曰般泥洹也般泥洹者正名云滅取其義訓自復多方今此經明常使伏其迷其迷永伏然後得悟悟則衆迷斯滅以之歸名其唯常説乎又菩薩住斯經者則已伏滅諸纍雖未造極便能示般泥洹衆示無妙泥洹復以無不示為大也更用茲稱經蓋是重美盡善矣案僧亮曰此是如來神道之極號常樂八味之都名涅槃是異俗之音音有楚夏前後互出乃有三名謂泥洹涅槃泥曰言涅槃者中正天竺之音也名含衆義此方無一名譯之存其胡本焉般涅言不亦名為無槃者名生名滅名因名相也生是八苦之本佛既無之不生也壽與太虛等量不滅也不從作因得故無因也體無十相無相也無學地法皆是其體略説三相以標神道一般若二法身三解脫談般若則三達之功顯論法身則應化之理同言解脫則衆德所以備也語此三法足明神道之極矣大者明其常故亦以大我大樂大淨故後有釋也如來始自道場終於雙樹凡三説涅槃二是方便一真實也初開三究竟是一方便但説解脫是涅槃而身智是有為也二方便中説法華破三究竟而身智故是有為耳今雙樹之説身智即涅槃謂究竟無餘之説也經者胡音修多羅修多羅名含五義也案法瑤夫涅槃者蓋窮原之宗會數盡之大歸其為體也妙絶於有無之域玄越於名數之分言之不能盡稱之不能訖然非稱無以擬極故寄稱以擬之非言無以顯實故因言以顯之其為目也總莫之大故稱苞衆理名冠衆義故曰一名之中有無量名也是則宗音無以譯其稱晉言無以代其號故欲以此音而當者失其旨此名而對者乖其致是為有稱之極言猶不能究況無稱之極乎是以涅槃至號其義贍博折而辨之則彌論無窮豈唯般若等三以極其致但略而舉其要者是以徑此三名入於涅槃伊字之譬不亦宜乎然則此三名殊而實同非體異者也如其體別則涅槃同於因成假名法也虛而非實豈得稱曰常樂者哉案曇濟夫大涅槃者蓋是大聖神道之極號八味之都名此是垂終之道教放言異唱故制名不同成天竺之音義有苞含此方無一言以當之故推義不一亦言無生復云無滅亦言無為亦言無相所以言無生者永絶於四生所以言無滅者量齊太虛故稱無滅所以言無為者不為生滅之所為故言無為所以言無相者體絶十相故言無相也涅槃者敢無學地諸功德盡為涅槃體也略舉三事以稱遂焉三事者般若法身解脫語般若明智周萬境辨法身明備應萬形稱解脫明衆纍不生智周萬境故三達之功顯備應萬形故能殊方並應衆纍不生明神道苞含所以成也所言大者有大我故下有文言譬如有一祕方攝一切方此經亦爾多有苞含所以爾者從於鹿野終於雙樹凡三説涅槃一明初鹿野説三乘各有別涅槃二明三乘同一涅槃三明真教破二方便説身智即涅槃以是故多有所含故稱為大經者胡言修多羅含有五義一能生二微發三湧泉四繩墨五華鬘或以文為經或以理為經或四十卷文字盡為經體所以言能生者此文行者尋求能生善根也所以言微發者善根漸增如初以三歸次以五戒如是乃至得道故有微發之義也所以言湧泉者譬文表理不可窮盡故如泉也所以言繩墨者繩本辨木曲直明此經辨耶正之理依文可知故知繩墨也所以言結鬘者華散在地不為人用以綖貫穿以成人首飾若不以綖貫不為人用明若不以文辨理於人無用以文辨理於人有用故如綖也雖有此義今言經五義之中一也得結鬘義也案僧宗曰此纍盡之都名萬善之極稱也大者一謂教大二謂理大何者始於鹿園訖至法華辨因果未滿明境行不周所以為小此教圓備所以稱大也昔三乘涅槃非實究竟是道理中小今明法身般若在乎衆纍之外是道理中大所以言大也涅槃者天竺正音此言解脫謂脫於萬纍者也纍患既息體備衆德今略舉有三可以貫衆一法身二般若三解脫也妙有清淨體無非法故言法也妙體介然異於太虛故曰身也澄神虛照鑒無不周故曰般若道高萬惑之表體無垢纍故稱解脫也此三德者體一而義異一體之上義目有三而今所以唯録取解脫以標經者有三義一明理在萬惑之外二者斥昔解脫何者以昔日小乘患身智起動求滅此患情憑解脫以身智俱盡是孤解脫故知小也今日所明體備衆德帶法身般若以常存故以稱大也經者謂三世諸佛從凡至聖莫不經由於此也案寶亮夫至靈幽寂體踰有無凝照虛湛妙過數表其旨絶於生死超有為於言境故大覺垂悲以被苦為本但群品根異則教成五別猶物迷障重未能安深所以先開方便之説資今圓常之旨也衆生既蒙昔教以習心便稍涉虛以入道體常無常二輪雙徹鑒生死為不有之有涅槃為不無之無既安真而悟理識苦空而斷迷自非修行入道發理緣之知則煩惑不遣生死難除故今教之興開神明之妙體也辨生死以二苦為本明涅槃以常樂為源妙質恆而不動用常改而不毀無名無相百非不辨今涅槃之音就用而得稱是出世法之總名貫衆德之通號代生死之要目美無餘之極説障纍既盡萬行歸真無德不滿衆用皆足轉因字果名大涅槃故下文言若一德不修則不得稱大涅槃也然斯之語乃是方土之音聖既出於彼國此亦無名以正翻但文中訓況指義釋而已也然其德淵曠難可備舉今略陳其樞要理可有三故哀歎品明謂正法寶城及祕密藏也二標別德三寄功用其義云何夫涅槃無體為衆德所成故取況寶城喻於斯旨非二乘所守瓦礫而非寶也既體備萬工亦何寶不滿但昔教未明今説始彰隱實顯權非祕密如何二舉別德者功德品云謂大常大我大樂淨等此是成涅槃之勝因故據別而標美也體無生滅故稱曰常八用自在謂之為我寂然無苦目之為樂塵穢永盡名之為淨體相無邊便名為大此乃是讚嘆之辭裒美之稱也三歎其工用者故師子吼品稱謂歸依洲渚也能使物免苦而永安離河而登洲越四流之淵海到無為之彼岸也若尋其名用理數忘言故聖化獎被談德萬端是以就開宗之始借喻於伊字云三點不縱不橫異昔有餘無德之説明具法身般若解脫也然此三乃化道邊要復貫通於諸德亦表異因中之色心顯佛果之勝用無感不應稱曰法身囑境皆明謂之般若即體無纍便名解脫明一一之德皆非涅槃要總為其體故下名字功德品中借八味甜蘇為嘆也談真俗兩體本同用不相乖而暗去俗盡偽謝真彰朗然洞照故稱為佛此經既於出世法之中開出世之教引外凡之近資接下愚之要道斯理圓而益人體無為而進德但文博而旨幽乃寄述於後釋也經者以經由為義凡學者若不由此理教則無容得解故以經之一字貫斯一部之文理也案智秀曰斯蓋圓極至德之總名也若備稱舊本應云摩訶般涅槃那夫道絶百非而理歸一致歸一致故則有識斯成絶百非故則無言可極然既因迹見名亦尋名知本但名迹之興乃肇自天竺在我大梁亦理應有稱而弘道之近既發彰西域未測此方何以譯翻是以先賢後哲皆修舊本述而無作故題之經首體德名也夫名以名體體故有德體者圓極妙有之本也德者波若解脫之流也談德乃衆論體唯一名雖有殊實則無異何者即圓極之體有可軌之義名為法身有靜照之功號為般若有無纍之德稱之解脫是則解脫之體能照亦能照之體解脫更無別體而有衆德也故以涅槃總名冠目圓體名總體圓故備含衆義矣下經文名字功德品以衆義釋於名云八味具足名大涅槃八味者一常二恆三安四清涼五不老六不死七無垢八快樂也尋此經致教之意如來化始鹿園旨窮鷲嶽唯明道極灰盡善必菩提未辨含情抱氣悉成無等但説壽量長遠復倍上數未明正覺虛凝湛焉不滅今此經者以至極妙有為指南常住佛性為宗致明闡提則正因無改辨法身則圓果嶷然所謂無餘之至教究竟之極説也經者經由義也天竺以詮理文總曰修多羅修多羅者備含衆義何者如出生微發涌泉繩墨之流也至於經由之義亦其一耳但梁之墳籍皆以經為目是以通方之士簡繁從略舉要而稱焉進不乖含總之一義退且循俗而得簡也案法智曰夫言象生自數內形名起於纍中至人神道既無象無言豈復有其形名者哉圓道不可以遍稱故以該德總名強謂之涅槃此天竺之音也具存胡名應言般涅槃那外國此名有多義茲土無音以反之故存胡而名焉既寄名為其名寄有言乎而以言言理者亦是寄言也若可寄言請試言之源涅槃為理超注數之表絶冥朕之外語其幽徹斯在於本有者也所言本有乃是玄指未來隔世為有耳不言現在同世有也若以未來為有則稟識之類源本未造因時已自有之故言本有也若未造因時本自有之則不待業緣為其始故非始造矣既非始造故説此未來不同三世要待造業方得為有也雖本自有之然未來未起已來用故故須了因然方應欲顯其果體圓滿具足故為之置名是則萬德之義無非涅槃義也故始開伊字便寄三德以明涅槃表異昔説也何者昔教以身智是有為未脫果縛須滅身智始是無為説此滅法為無為解脫也若此滅法可得説為解脫滅度無為樂淨諸義故對生死即説之為無餘涅槃也是為昔説涅槃亦有多義但不得説身智耳所以三事俱無也今既無餘極教有異於昔必須存三德即身智而為解脫矣存三德者顯三德一體為涅槃法法皆有德為涅槃義也三德體為涅槃法者經言法名自體故以體為法也三德為涅槃義者以三德在法則法有三義故三德義皆為涅槃義也言法身為涅槃義者法以法則為用身是體之異名良以其體可法故名為法身今常住涅槃既有體可法故以法身義為涅槃義也般若義為涅槃義者般若以鑒解為功常住涅槃既言有體則無知而無不知即是般若故以般若義為涅槃義也解脫義為涅槃義者解脫以脫縛為義常住涅槃其體雖在然因縛果縛二俱解脫故以解脫義為涅槃義也昔説涅槃既言身智二俱盡滅所以二俱明之其餘諸義二教通有事同解脫略而不辨也唯我義功在覺者涅槃是法寶人法既殊無俟有釋也若凡是萬德義皆為涅槃義則法是圓法名亦圓名名法兩圓始盡至人神道之極致故名涅槃也復以大大之者顯其名理俱極也昔二事盡滅未是所以大今明涅槃其體圓滿理既應名名不失理名理俱極始是所以大也經者唯金口所吐言理乃得稱經弟子製作非佛印可不得稱也何者經之字訓略有二義一訓言常其二言由常者夫至人智極而後言言必稱理矣衆聖莫能改言故言常也出凡入聖靡不由之佛之所説既窮茲二故得稱為經也弟子所説理有所未鑒言有所未真既於常由二義有所未極故不得稱為經是以維摩勝鬘雖有所説要須佛印可方得稱經案法安曰涅槃之為名言乎至極果也此極果者微過形聲妙絶筌寄有纍斯遣是德必備故能超踰生滅凝然常存何以言之夫照法未窮新知移其神惑纍為因故其起必謝今此極果體無塵翳為明因所生嶷爾而常不其宜乎將以汲物乃寄言三德以其唯法為體號曰法身惑纍斯亡稱為解脫所照靡遺謂之般若法身一名標其妙體智斷兩稱舉其勝德略言此三則已總攝衆美矣天竺一名合此三訓此出一稱不窮其致故仍彼胡音用標經首也大者夫涅槃之名名總衆義從因地未滿預有斯稱故加一大字使宗致曉然也案曇準曰蓋是吉祥之靈府生白之虛室也撿因則行逾十地核果則妙極摳始冥造弗能移玄運莫之動一寂孔神此以常為宗也然群美不可盡言故偏寄三德取其洞照虛明目之般若應不搖寂字曰法身結惑都亡謂之解脫三義既彰涅槃稱在大是梁方之言涅槃是西域通語彼訓多含此方無以偏譯故直存胡本以為題目標出敘中要義釋名第一辨體第二敘本有第三談絶名第四釋大字第五解經字第六核教意第七判科段第八右八例釋名第一案僧亮敘曰如來神道之極號常樂八味之都名而此異俗之音有楚夏之別所謂涅槃泥洹泥曰也涅槃乃中正天竺音也名含衆義此方無以為譯法瑤曇濟寶亮曇愛智秀法智法安曇準悉同而法瑤所敘如有不同云故曰一名之中有無量名也案尋此而言是則涅槃之名非直止含衆義亦含衆名也又寶亮云雖復同無翻譯不云名含衆義乃云訓況指釋義也敘曰聖既出彼此方無以正翻但文中訓況指義釋而已也法安亦曰訓出衆義也道生曰正名云滅取其義訓自復多方今此經明常使伏其迷其迷永伏然後得悟悟則衆迷斯滅以之歸名其唯常説乎又菩薩住斯經者則已伏滅諸纍雖未造極便能示般涅槃衆示無妙涅槃復以無不示為大也更用茲稱經蓋是重美盡善矣慧朗述法瑤曰此言寂滅謂即心識不可得之名也又述曇纖曰此言無纍僧宗曰此言解脫尋無纍之與解脫名殊而義一故是離縛之謂耳然而解之與脫俱是德名無纍之稱兼所去也案僧肇論曰此言滅度亦曰無為蓋是滅生死度彼岸寂怕之謂也會稽慧基同彼云此言無為智藏法雲同彼云此言滅度明駿案雖無正翻譯而非衆德之都名乃是無纍之總稱也何者下文曰般涅言不亦言無槃那言生亦言滅於是具列無纍之名以為訓釋也辨體第二案道生曰夫真理自然悟亦冥符真則無差悟豈容易不易之體為湛然常照但從迷乖之事未在我耳苟能涉求便反迷歸極僧亮敘曰無學地法皆是其體佛略説三以標神道一曰般若二曰法身三曰解脫也法瑤敘曰涅槃至號其義贍博豈唯般若等三以極其致但略舉其要然則此三名殊而實同非體異者也如其體別則同因成假名之法虛而不實豈得稱常僧宗敘曰纍患既息體備衆德略舉其三可以貫衆然此三德體一而義異就一體之上義目有三也寶亮敘曰障纍既盡萬行歸真無德不滿衆用皆足轉因字果名大涅槃然其德淵曠難可備舉略陳其要理可有三一謂正法寶城二標別德三寄工用何者夫涅槃無體為衆德所成取況寶城以喻斯旨也別德者謂大常大我等此是成涅槃之勝因也工用者謂歸依洲渚能使物免苦而獲安也智秀敘曰體者圓極妙有之本也德者般若法身解脫之流也談德雖衆論體唯一何者即圓極有可軌之義曰法身有靜照之功曰般若有無纍之德曰解脫是則即解脫之體可軌亦可軌之體能照更無別體而有德也案舊所詳習有二種解釋一謂圓極果體真實妙有非如假名但以有用而無體也一謂涅槃無體假衆德以成豈得不空耶慧朗述法瑤曰生死涅槃義分為二謂十二因緣顛倒故有即因緣無性是名涅槃豈待離煩惱已有妙有可得而不空乎故般若經云設有法過於涅槃亦説如幻如夢矣又述纖愛宗等舊釋云萬行得圓極之果果體是實而隨德立義非假衆義共成一體也法安曰涅槃雖假衆德為體而異五陰成人也何者人及五陰假實斯空今涅槃雖空而衆德是實也敘本有第三案道生敘曰歸極得本而似始起始則必終常以之昧若尋其趣乃是我始會之非照今有僧亮敘曰般涅言不亦名為無槃者名生亦名為因不從作因所得故無因也寶亮敘曰辨生死以八苦為本明涅槃以常樂為源妙質恆而不動用常改而不毀無名無相百非不辨今涅槃之旨就用而得稱也若談真俗兩體本同用不相乖而暗去俗盡偽謝真彰朗然為佛也法智敘曰幽微難解在乎本有也所言本有者乃是玄指未來隔世為有耳不言現在世有也稟識之類源本未造因時已自有之故言本有是則不待業緣為其始故非始造矣故説此未來不同三世要待造業方得為有也雖然未來未起未為已用故須了因然後方應也慧朗述法瑤曰生死不斷由十二因緣因緣無性即是涅槃豈是始有也談絶名第四案衆議曰舊所詳習有五種解釋第一妙極法身寂怕無為與真如等際一相無相豈言德所能及雖復寄言以往辨雖辨而絶言猶因指以得月月非指也第二夫言方而理圓難以辨述神道冥漠可會而不可言也譬輪扁之輪不能傳妙於所授世諦麁淺尚難可言況真諦深妙而可名乎第三所謂絶言者法身之地絶凡纍之名耳體是妙有尊勝云何以尊勝之名而不得耶第四夫名字是相纍之法若召相纍之地則與所召相稱若無相之地雖因召而得終絶於召也第五一切諸法本絶名字以此而談豈直法身亦可目生死為涅槃目涅槃為生死今名字已定謂涅槃絶於生死之名為可貴耳釋大字第五案道生敘曰有不在今則是莫先為大既云大矣所以為常常必滅纍僧亮曰大者明其常故亦謂大我大樂後文自有釋也僧宗曰謂教大理大也教大者此説之前辨因果境行並未周圓今日所明究竟了義故言大也理大者昔日三乘涅槃非實究竟理中為小今日身智解脫在乎纍外理中為大故言大也寶亮曰體相無邊名之為大也法智曰理既應名名不失理名理俱極故言大也法安曰昔日雖有涅槃體德未圓不得稱大今日體圓德備故稱大也釋經字第六案僧亮敘曰經者胡音修多羅名含五義也僧宗敘曰從凡至聖經由此理也寶亮曰學者所由得解也以此一字貫一部之文理也智秀曰天竺以詮理之文總曰修多羅備含衆義如出生微發涌泉繩墨華鬘之流也至於經由之義蓋其一也法智曰有二訓一曰常謂稱理之言衆聖莫能改也二曰由謂出凡入聖之所由也法安曰經者訓釋有二種一曰常二曰法也外國修多羅有衆多義亦曰涌泉亦曰繩墨今以常義代彼涌泉明流注而不竭也以法義化彼繩墨明規矩暮則軌靶不沒也核教意第七案僧亮敘曰如來始自道場終於雙樹三説涅槃而二是方便一是真實何者初開三究竟謂一方便也但説解脫是涅槃身智是有為也二方便中雖説法華破三究竟而身智故是有為也今雙樹之説身智即涅槃故謂究竟無餘之説也寶亮敘曰群品根異則教成五別猶物迷障重未能安深所以先開方便之説資今圓常之旨蒙昔教以習心稍涉虛以入道體常無常二輪雙徹鑒生死為不有之有涅槃為不無之無既安真而悟理識苦空而斷迷自非修行八道發理緣之知則煩惑不遣生死難除故今教之興開神明之妙體也故開宗之始借喻伊字不縱不橫異昔有餘無餘也僧宗敘曰今所以唯録取解脫以標經者有二義一明理在萬惑之外二者斥昔解脫之執昔日小乘患身智起動求滅此患而憑解脫是故用今之勝以代昔也智秀敘曰如來化始鹿園旨窮鷲嶽唯明道極灰盡善必菩提未辨含情抱氣悉成無等但説壽量長遠復倍上數未明正覺虛凝湛焉不滅今此經者以至極妙有為指南常住佛性為宗致明闡提則正因無改辨法身則圓果嶷然所謂無餘之至教究竟之極説也判科段第八案僧亮曰經出未盡現分可為四別第一勸問第二問第三答問第四法輪證也案曇愛曰大分有十別第一序説即序品也第二正説從純陀品訖金剛身品也第三流通説從名字功德品訖四倒品也第四佛性説從如來性品訖月喻品也第五歎經功能從菩薩品訖現病品也第六明依經修行即五行也第七出行體有功德之義以向佛果為行義由功而德為功德義也第八料簡上所明佛性即師子吼品也第九猶是料簡佛性廣辨樹王下以來及今日所明之旨舉彼善星斷根之事即迦葉品也第十明流通命憍陳如度十外道從憍陳如品訖經也案曇纖曰大分此經為兩別前略後廣就略門中分為五段第一序品也第二開宗明常住因果從純陀品訖哀歎品第三問從長壽品訖問也第四答從讚迦葉入大衆問品後也第五付囑從爾時大衆白佛訖品也就廣門中分為五段第一廣果即現病品也第二廣因即五行也第三廣流通即十功德品也所以流離光遠來正為明弘通故也第四廣佛性即師子吼迦葉兩品也第五廣付囑從憍陳如品訖經文也案曇濟曰大判凡有三段第一勸分第二問分第三答分從如是我聞至迦葉發問勸分也從答問訖憍陳如答分也案僧宗曰經之始末凡有五別第一由序即序品也第二略開常宗從純陀品訖新舊醫也第三廣明常住從長壽品訖迦葉品也所明因果境行粗已周矣將欲付囑第四先破外道從憍陳如品至阿難何在也文旨既畢應須付囑是以第五顧命受持之人從阿難比丘今何在訖經也案寶亮曰此經大致有四別第一從此訖老少二人譬勸問也第二從多羅聚落迦葉以下發問也第三從佛讚迦葉以下竟迦葉答問也第四從憍陳如訖經付囑流通也所以第一通為勸問者此經正以問答為宗自雙樹以前所説半字皆不了義欲令衆生有疑應問也案道慧記曰大判此經有十別第一序説即序品也第二正説從純陀訖金剛身也第三流通説從名字功德訖四倒也第四佛性説從如來性訖月喻也明所以得常者以本有佛性故也第五歎經即菩薩一品也第六證成常住明不食而現食不病而現病不滅而現滅即現病品也第七明所得無病者由行故也即五行十功德也第八境界明義為成於行即師子吼迦葉也第九破外道説即憍陳如品也第十囑纍説從阿難何在竟經文也案道慧又撰曰此經有十別第一序品也第二開宗即純陀品也第三會通即哀歎品也第四流通從長壽品訖現病品也第五明因即五行也第六明果即十功德也第七明佛性即師子吼品也第八辨始終即迦葉品也第九破外道即憍陳如品也第十囑纍即顧問阿難也案法安曰此經分為二別初訖大衆問品為前説也末從現病品訖經為後説也就前説中有五段第一經之由序從序品訖卅五問第二正明經體從答問始訖名字功德也第三明流通人法從四相品訖四倒品也第四明佛性從佛性品訖月喻品也第五歎經囑纍從菩薩品訖大衆問品也就後説中分為五分第一由序即現病品也第二重明涅槃因果即五行也第三明流通功德即十功德也第四重明佛性即師子吼迦葉也第五重更囑纍憍陳如品竟經也案智秀曰此經廣略有二別第一略門從序品訖大衆問品也第二廣門從現病品訖憍陳如品就略門中有三段第一由序即序品也第二正説從純陀入大衆問品也第三付囑從大衆問品中爾時大衆白佛訖品也就廣門中有兩段第一廣前正説從現病品訖迦葉品也第二廣前付囑從憍陳如品訖經也案法智曰此經大判有兩別第一經家序説即序品也第二正説從純陀品訖經也所以無付囑者傳譯未盡就正説中分為六段第一純陀哀歎兩品為開宗第二從長壽品訖現病品可為隨問説也第三説五行示聞經人修行之法也第四説十功德明行人所得之功德也第五師子吼迦葉明因果佛性也第六憍陳如化外道説也案曇準曰此經不出三別第一序即序品也第二正説從純陀品至阿難何在也第三流通從顧命阿難訖經也又撰曰此經有八別第一序即序品也第二開宗即純陀哀歎二品也第三明緣因境及經功德從長壽品訖四倒品也第四明正因佛性從如來性品訖現病品也第五廣緣因行從五行訖十功德也第六廣正因性從師子吼訖迦葉品也第七廣明果相即憍陳如品也故云因滅無常色獲得常住解脫色也第八付囑從阿難何在竟經也明駿案大分此經可為三別第一敘述即序品也第二略説從純陀訖大衆問品也第三廣説從現病品訖經文也就略説中有三段第一開宗勸問從純陀訖老少二人譬第二問答從多羅聚落迦葉發問入大衆問品也第三略付囑從大衆問品中爾時大衆白佛訖品也就廣説中有三段第一廣前開宗即現病品也夫食為生本病為滅因前純陀品因食以明現生此品因病以明示滅第二廣前問答之旨從五行訖憍陳如品也此經所明常住因果境之與行今以五行十功德廣行廣因也師子吼迦葉廣境也憍陳如以廣常果故云因滅無常色獲得解脫常樂之色也廣略所明因果境行粗已周悉將欲教洽未來化傳永劫若不摧彼異學挫伏迷元千載之下終為流通之病是以第三度諸外道以滅邪群使弘通大士身心無礙故曰廣前付囑從爾時諸外道以下訖經文也
