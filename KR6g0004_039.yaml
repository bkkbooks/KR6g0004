body:
  text: 廣釋八種知見覺廣釋四無礙廣辨無所得義廣辨神通應化無拘執義廣釋反常説法謂真諦説為世諦義等廣明內道外道異相梵行品之第四善男子我今於是大衆之中至復得名為虛空等地案僧亮曰不為有所繫縛空所迷悶解脫空有以釋地名也下以二譬釋功能也一以不生貪瞋二多容衆生寶亮曰第七段廣明十一空功用大也既得金剛心見一切萬法盡便於緣中任運無復有滯礙拘執即是第一歎後從本有今無偈已去訖六念處來廣之也第二歎言如虛空於可愛色不生貪樂於不可愛色亦不生瞋明住金剛心時不見可愛之異相但一相無相下十無盡來廣也第三歎言如虛空廣大無對悉能容受一切物譬得金剛心如虛空具一切知見無所不周下用八種知見廣此義也僧宗曰備上空有雙照故得四辨之利以化物也就此有六重釋第一總明一切法有無礙第二遍就三乘行上明法無礙第三明得四無礙不取著也第四辨能持第五推因第六奪二乘所得以顯菩薩備也智秀曰此下第三科列聞法得利者也上明行捨得智知於無法此次明非直知無亦能有無通照也善男子菩薩摩訶薩至如是等法一切知見案僧亮曰次説八種知見出所容事此第一若行若緣等總一切法也在內名性形外名相強者名因弱者名緣也寶亮曰此下廣明第三譬八種知見明自行下四無礙明外化第一總因果中知見若行者生滅起動之行也若緣者從緣者從緣而有傍助為義也性者內也相者外也力強者為因踈遠者為緣也知衆生善惡剎那起動之心也若根者利鈍根也若禪定者知衆生得定深淺也若乘者大小乘也若善知識者善知外緣也若持戒者達止惡也若所施者善知忘相也如是一切知見者總結因果中知見也第二知外道所行法不見其得善果也第三見外道所行法得三塗果知改惡向善得清淨解脫果也第四見常無常也第五知見逆流沿流第六知見轉障第七知見佛性第八知見二諦復次善男子菩薩摩訶薩至得正解脫是名不見案僧亮曰第二事淺名知與第八同知耶因不得正果從初至牛糞之上明四威儀苦也衣麁麻衣至粳汁沸湯明衣食受苦也自下明行業苦也寶亮曰第二知外道所行法不見其得善果也復次善男子菩薩摩訶薩至入正解脫是名為知案僧亮曰第二見耶見因必得苦果知出苦必得解脫何者是人雖行邪道厭苦情至此厭心出苦必求正解脫耶果易知名見解脫事遠名知也寶亮曰第三見外道所行法得三塗果知改惡向善得清淨解脫果也復次善男子菩薩摩訶薩至悉有佛性是名為知案僧亮曰第四常無常等合觀初總易知名見後別難見名知也寶亮曰第四見常無常復次善男子菩薩摩訶薩至從明入明是名為見案僧亮曰第五知逆隨諸流逆難了故名知隨易了故名見從信至是名為知逆流中言凡夫者內凡夫斷外名逆未斷內名隨也下從明入明人為明三塗為暗是外凡夫皆是隨耳寶亮曰第五知見逆流沿流也復次善男子菩薩摩訶薩至地獄受報是名為見案僧亮曰第六知轉重為輕轉輕為重也若轉重為輕者向解脫故為知轉輕為重向生死故為見也寶亮曰第六知見轉障也復有知而不見至猶如暗夜所見不了案僧亮曰第七知佛性因論知見及以如來非其例也寶亮曰第七知見佛性復有亦見亦知所謂諸佛至即是如來五眼所知案僧亮曰第八知二諦也所以復説真俗者初説地相不見諸法後説地能無法不知恐聞者致生有無之惑説真俗以會之也真諦無相故不見不知非謂事隱不見與亦見義異知所惠施上云真諦無相不見似如俗諦決定有相可見更説俗諦知受者三事假為説名不見無定相可見上所言見皆説知為見也寶亮曰第八知見二諦者也迦葉菩薩白佛言世尊至能如是知得何等利案僧亮曰四等以外益為義今説捨果空平等地八種知見於四等中有何利耶佛言善男子菩薩摩訶薩至辭無礙樂説無礙案僧亮曰慈以外益為利四無礙者慈之利也寶亮曰次明外化行也凡有五翻解釋亦即是八種知見但以自行外化為異也此先列四無礙名也法無礙者知一切法至即得如是四無礙智案僧亮曰總知名實名法無礙隨名解義名義無礙説名説義謂辭無礙説不可盡謂樂説無礙也寶亮曰第一翻法者識法區分也義者言之所以也辭者巧便宣通也樂説者以無懈心為衆生説也隨字論者聖人為法立名字欲使衆生識善惡區分改惡修善也正音論者隨方俗類得解脫無不正也闡陀論者大集論也世辨論者世諦中最利辨也復次善男子法無礙者至種種異説不可窮盡案僧亮曰菩薩知法本為度人人不出三乘以知三乘法為法無礙也知三終歸一為義無礙一戒定慧作多名説為辭無礙樂説義與亦同也寶亮曰第二翻説三乘法為法無礙知理歸一為義無礙於一法上作種種名説為辭無礙説法無倦為樂説無礙也復次善男子法無礙者至若取著者不名菩薩案僧亮曰上雖再説未明無著今説無著以成無礙之義寶亮曰第三翻以忘相為宗也迦葉菩薩復白佛言至説言知法而不取著案僧亮曰義旨未顯應須繫發也夫不取異相則不知異不知異相不知法也佛言善男子夫取著者至一切凡夫無四無礙案僧亮曰無礙之稱出生死為名取著之名不出生死下出事證也此先證取著非無礙也寶亮曰迦葉難意既云得四無礙云何取著耶佛今答云取著之心本是惑纍則不名無礙後心菩薩執相永盡故名無著也善男子菩薩摩訶薩至菩薩摩訶薩而無所著案僧亮曰證不取著得四無礙復次善男子法無礙者至而不可盡是名樂説無礙案僧亮曰第四重釋法義四事之異耳宣説一義必無有義者如地持山菩薩所説無地無山亦無所持諸佛境界者知無地無山無為相也凡夫境界者著名求相也寶亮曰第四翻得此六法能持不忘以不忘為釋也善男子菩薩摩訶薩至説世論故得樂説無礙案僧亮曰第五以世諦為法以第一義為義也寶亮曰第五翻以世諦為法無礙以第一義諦為義無礙者為小乘人故作此説也若依十地經者第一義諦為法無礙世諦為義無礙此為大乘人説故也空是一類法易知故名法無礙世諦虛搆區別難知名義無礙也善男子聲聞緣覺若有得是至聲聞緣覺真實無有案僧亮曰二乘無因故無無礙也寶亮曰向明得今明失也何以故菩薩摩訶薩至何故默然而無所説案僧亮曰夫度人出苦必由説法若但以神通證無無四證也緣覺不能説法度人至一切無有四無礙智案僧亮曰別證所以無也云何聲聞無四無礙至無此三故無四無礙案僧亮曰聲聞從佛聞法能説法度人亦知常住佛性無善方便於四事中非無礙耳復次聲聞緣覺不能畢竟至是故二乘無四無礙案僧亮曰向別今總不知衆生根世諦疑不知善説第一義空故無四無礙也迦葉菩薩白佛言世尊至若具足四無有是處案僧亮曰聲聞如四河菩薩如阿耨達池佛如大海也或有得一者比凡夫言得四不必一人具四迦葉菩薩白佛言世尊至説言菩薩而有所得案僧亮曰住虛空無得之地得八種知見具四無礙衆生起著佛將欲遣故發問也寶亮曰上已六重釋四辨人情生著今拂其封纍以十無以遣之也僧宗曰此下辨十無廣上第二譬明菩薩心不存於有無也智秀曰此下訖六念妄執情迷易隨緣轉既聞説無復謂終無所得次以此文顯有所得汲引信情文有六別第一請釋本有今無偈第二明佛能為反常之説第三正明有所得義第四明見了了相第五説偈歎佛及經教第六請釋世間出世間同異也佛言善男子善哉善哉至是故菩薩名無所得案僧亮曰明四無礙以假得為名實則無得言雖有異而義不違地目也僧宗曰第一存有得為四倒無所得為無礙也寶亮曰凡有十雙相對此第一有倒無倒為對也復次善男子無所得者至是故菩薩名無所得案僧宗曰第二明暗相對寶亮曰慧與無明相對也復次善男子無所得者至是故菩薩名無所得案僧宗曰第三以因果相對寶亮曰以生死與涅槃相對復次善男子無所得者至是故菩薩名無所得案僧宗曰第四以因中行相對寶亮曰以菩薩乘與二乘相對復次善男子無所得者至是故菩薩名無所得案僧宗曰第五以教相對寶亮曰方等小乘對也復次善男子無所有者至是故菩薩名無所得案僧宗曰第六定亂相對寶亮曰空三昧與生死輪復次善男子無所得者至是故菩薩名無所得案僧宗曰第七以常無常理相對寶亮曰同此釋復次善男子無所得者至是故菩薩名無所得案僧宗曰第八以解惑相對寶亮曰以第一義與五見相對也復次善男子無所得者至是故菩薩名無所得案僧宗曰第九以因果人相對寶亮曰佛與大乘相對也善男子汝之所問亦無所得至是魔眷屬非我弟子案僧宗曰第十遣問遣答相對寶亮曰同也迦葉菩薩白佛言世尊至離魔眷屬為佛弟子案僧亮曰廣明無得之義也所以示者空是萬行之主故也迦葉菩薩白佛言世尊至世尊是義云何案僧宗曰此下第五段也向十無遣執其封心稍弭今欲更引證也寶亮曰此下竟六念處廣上第一譬也物情所執本以相惑居心故處處滯礙則不能得無方致化今明十地菩薩金剛心滿煩惱永盡故能無方隱顯百變自在故言無所拘執也迦葉今難意言若佛果得無拘執何故上説本有今無之偈獨為純陀不普為大衆得知如來未免拘執也佛言善男子我為化度至文殊師利即得解了案僧亮曰佛答意謂盡説法也此下先廣明本有今無義後別答問迦葉菩薩言世尊如文殊等至是無常者無有是處案僧亮曰明佛為計著衆生説地名無得耳無計著者則説地名有得也文殊解了者上文殊將問差別無差別義聞此偈即了也善男子如來普為諸衆生故至雖見諸法説言不見案僧亮曰此下正答問也如毗尼中説隨俗故問也僧宗曰此第六段也自初説十一空人情聞無心無所寄故述八種知見及四無礙之利既聞有説更復捨無封有為遣此滯還説十無復洗執情時衆聞空有互説莫知所厝如來呵止其心當尋求教下之意如來所説莫非利益反常之説尚當時為益豈況空有二説而更生封執耶説有為善知世諦説無為明諸法斯空是則有不乖無無不背有豈得乖有無之言而增其執耶雖知諸法説言不知者假就外道學也見亦如此也寶亮曰此下別答無拘執相既言知復言不知此是反常之説明如來住空平等地能種種説法自在隨意若爾汝云何難言佛有拘執耶雖知諸法説言不知者雖知常住而唱言無常也雖見説不見者佛明見真常而説言不見也有相之法説言無相無相之法説言有相案僧宗曰有相之法説無相者實自不滅言斷滅也無相之法説有相者佛實絶相言菩薩王宮生也寶亮曰三十三天實是生死而説云是常我樂淨是謂有相説無相也無相説有相者謂説涅槃是苦無常也實有無常説言有常至我樂淨等亦復如是案僧亮曰如阿羅漢未來有生死之相而説無也實無究竟之相説言有也僧宗曰實有無常者謂三十三天説之為常也實有常者説偏教濫佛地三乘之法説言一乘一乘之法隨宜説三案僧宗曰三説一者破異三之惑説同歸之教也一説三者昔日方便隨宜之教也略相説廣廣相説略案僧宗曰如一因緣廣則十二略則唯因果而已也四重之法説偷蘭遮偷蘭遮法説為四重案僧宗曰事現於律也如僧戒為輕而尼戒為重犯説非犯非犯説犯至如來明見衆生根故案僧宗曰如僧獨行非犯尼則為犯等也善男子如來雖作如是等説至隨宜方便則為説之案僧亮曰因虛妄説得法利者語心則無虛妄若虛妄而有益必亦説之重釋上事耶善男子一切世諦若於如來即是第一義諦案僧亮曰二諦之名出自佛説不由凡夫也假有名為世諦無有是第一義也説假有欲表非有故於佛是第一義也僧宗曰二諦之名出於佛口不出凡夫説於假有欲表非有而於如來常是第一義也寶亮曰世諦雖復森羅於顛倒者常有也於無惑者常空未嘗有也若以佛而取恆是一諦然至佛之時乃知衆生是夢於如來終日不有也有無可有無無可無寂然無相故於佛盡是第一義也智秀曰昔説涅槃都無身智言未了義即是虛故名為世諦此之世諦其實非無法為佛所鑒即為第一義也何以故諸佛世尊為第一義至諸佛終不宣説世諦案僧亮曰釋上義也衆生著有佛明非有説假有以汲之為令衆生知假有非有若不知非有佛亦不説假有何者雖復假實不同為患是一何須説也僧宗曰向反常説令回其解云如來隨方釋化為益不同也寶亮曰凡夫要約世諦故乃識萬法無也故云為令衆生得第一義故説世諦也善男子如來有時演説世諦至非是聲聞緣覺所知案僧亮曰説佛無常凡夫謂實是第一也説第一義衆生謂佛説於世諦者佛説常樂是第一義凡夫便謂假是世諦也寶亮曰近而取之假名實法空皆是世諦遠而取之九地以來所得無我空者亦是世諦唯有涅槃體常寂滅為真諦耳而物情所謂九住以還得空負第一義論理悉是世諦也善男子是故汝上不應難言至云何難言無所得耶案僧亮曰明佛意難會也聞為計者衆生説無得是平等地便謂一切無得還結上也僧宗曰此下第七段向聞反常雙遣物情迷悶心無所厝還説有得以收其意也常得涅槃即第一義也寶亮曰佛説無方豈汝境界耶智秀曰第二正答難也有得之義即是菩提涅槃迦葉復言世尊第一義諦至亦名菩提亦名涅槃案僧亮曰第一義諦真實之稱也真法有三種十一空通智為道也智即菩提也結盡無為名涅槃也此二皆第一僧宗曰第一義理理應是常常則無可得若於事有得則是無常欲使如來釋所以為常非始有也若有菩薩言有得道至猶如佛性無得無生案僧亮曰此通難三法也世尊夫道者非色非不色至菩提涅槃亦復如是案僧亮曰偏難於空明無相可得也寶亮曰涅槃是衆德上總名也此三德唯一體若是可得應是無常何故常法無得有故非常也佛言如是如是善男子至以是義故不可捉持案僧亮曰以苦行等為道是則無常以空為道是則常也菩薩少見佛性得名為常外道伏結以還生故故名無常僧宗曰先釋常必在佛以有煩惱䨱故不能得見得見之日非始有也寶亮曰道若無常云何能令行人斷惑成聖耶善男子道者雖無色像可見稱量可知而實有用案僧宗曰不可令非色而無其體體居萬惑之表行滿則用也善男子如衆生心雖非是色至一切菩薩了了見知案僧亮曰見空斷惑有空之用也了了知見者以二事證有也一謂斷結二謂可了了見也僧宗曰借衆生心以為況也善男子見有二種至雖如是見初無見相案僧亮曰復以見為證世間思慧不了修慧則了也僧宗曰此下第八段證有道也有五翻此即第一明有見者故知必有也寶亮曰相貌見者謂九地以還信見也眼見者十住了了見也又釋十住見不了故曰相貌見佛見滿足故稱之眼見也善男子以是因緣我於往昔至名為凡夫菩薩亦爾案僧亮曰以見有了不了因緣故故知有也引昔所説見有見相是世間也見無見相是佛菩薩也僧宗曰第二翻引昔已為舍利弗説故證知有也寶亮曰世間不知見者外道也所知者佛與十住亦知外道所不知者佛與十住亦知也然世間所不知者謂佛性也外道不知而起斷常之見菩薩雖知不言有所知相是故無拘執也
