body:
  text: 釋意密顯無常迹義釋教密顯解脫義廣前名字功德品也四相品之第三爾時迦葉菩薩白佛言至唯有密語無有密藏案僧亮曰二密䨱常前已開發今釋上偈云開微密不言藏者以佛無藏故也自下諸譬明無短故所以不藏也法瑤曰上來廣説身口密義似若如來必有藏積祕吝之懷是以迦葉明佛乃有密語無有密藏如來成其所説也僧宗曰時衆於上粗已領解將欲更彰身智在萬纍之表申述昔教未説之意是以迦葉命言領解但昔日䨱相事多事須廣拂下文對佛捉昔偏教次第開洗所謂開微密也唯有密語者迦葉探取佛意言唯有密語無密藏也何者以昔常機未至不得説常而無常之教乃意在於常豈有祕密耶寶亮曰此下將廣解脫故先顯聖意唯有密語無有密藏者即廣意密也道慧記曰前開身口密此開意密也智秀曰此下重開口密譬如幻主機關木人至諸佛世尊有祕密藏案僧亮曰幻者術淺不欲人知如來不淺常欲人知豈名為藏慧誕曰幻者所作但令人見不令人得佛則不爾常願衆生同我所得豈名為藏耶佛讚迦葉善哉善哉至智者了達則不名藏案僧亮曰此下諸譬佛成迦葉所説也秋月雖明有目乃見於無目者名為藏也佛法亦爾於智者為顯愚者為䨱也寶亮曰佛廣説十譬前八譬一向明無祕藏第九譬釋教明所以不先説深法者為衆生故也第十譬明衆生若不在此五時教中學者非佛於彼有惜故也此第一譬也善男子譬如有人積金銀至是故不得名為祕藏案僧亮曰並是明佛無祕藏義善男子譬如長者雖有一子至晝夜殷勤教其半字案僧亮曰初説小後説大似如有隱故以譬申之衆生具縛應聞具教理數相感詣師之義也心小而聞滿字教者必不能受譬不速成也乃説一切諸法無常牽令入或如將還也三乘偏教喻以半字也而不教誨毗伽羅論何以故以其幼稚力未堪故案僧亮曰大乘六行滿字之譬善男子假使長者教半字已至云何當言如來祕藏案智秀曰明以無大機致感小教豈是祕吝䨱藏而不説耶佛言善哉善哉善男子至所謂如來常存不變案智秀曰合譬結旨也復次善男子譬如夏月至然佛如來實無所藏案寶亮曰若不於佛五時教中學者豈是佛咎迦葉復言我定知如來世尊至常存無變是義云何案僧亮曰證上半字也僧宗曰領解自申所懷也但昔言未洗人疑不除今廣引昔偈令釋所以施權之旨也佛言善男子我為一切聲聞至云何是人舌不墮落案僧宗曰廣出説偈之緣起以顯隨時設教之不同也迦葉復言如佛所説至而此去者為至何方案僧亮曰證無藏也亦欲以下況上明二乘尚無況如來也僧宗曰前偈證有餘涅槃此偈證無餘涅槃也雖復合牽一偈意在下半偈耳迹不可尋者身智俱亡也此亦昔言故應拂也下釋云近於菩提菩提涅槃無有方所事絶近情謂難尋也偈旨如此誰能解耶佛言迦葉夫積聚者至不貪食者是名知足案僧亮曰明有為有資尚無藏積況乃無為不須者耶寶亮曰積聚二種一有為二無為者謂道積衆行非是世間之財寶也聲聞捉相心中行道不得其所故言有為也又協相修善去佛果遼遠終日生死之謂也無為如來行者若能謹依六行修道進德不取有無之相故名無為又若忘相行道取佛果速因中説果亦言無為也迹難尋者則近無上至於大涅槃而般涅槃案僧宗曰去無至者雖有出苦之名及其造極此處無迹故無至也是故於此婆羅樹間者謂法身之迹妙絶難尋寄大解脫而示滅也佛告迦葉所言大者至若一人具八則為最勝案僧亮曰答彼問下句云廣為衆生説也常旨已宣今所廣者廣大義也僧宗曰名字功德品中非不一往舉釋大體而未釋大義是以此中引八大人覺取含容為義也智秀曰上云是大涅槃能建大義未釋所以今明有大德故建大義也明駿案正廣解脫也上名字功德品已略明解脫亦粗釋今日所以稱大也極果萬德略舉其三以成祕密之藏而以解脫一德用當經題者涅槃是無纍總名以多義訓取解脫是其一也是故問曰云何於此經即請經名經力及流通也究竟到彼岸即是問解脫也所以前品答云降伏一切諸結煩惱及諸魔性於大涅槃放捨身命已是略顯解脫也闕一問説法有幾種上四相已廣前品流通法也從有餘無餘涅槃已來至此具廣三德也後四依品以下廣顯流通人也所言涅槃者無諸瘡疣至是故名曰大般涅槃案僧亮曰瘡譬苦也以無苦故名為涅槃若但自治不名大滅滅一切苦乃名大滅也悉治已者謂有信也雖未即差已為差因也僧宗曰上釋大義此釋涅槃義也瘡疣是纍既無瘡疣即是解脫此中先明能治衆生引醫師為喻下去出體廣明解脫也大般涅槃者名解脫處至甚深義故名大涅槃案僧亮曰金剛後心煩惱盡處得涅槃也迦葉菩薩復白佛言至是故涅槃名無瘡疣案寶亮曰若依如下文涅槃能為一切衆生作解脫因緣處也閻浮提衆生有二種一者有信二者無信釋有信者有二種釋一謂從佛出世有隨教修行得信首根立者悉名治已自未立已還有信未定不免闡提故束為無信人也二者值佛能生一念善已上乃至信首根立悉名治已若不能生一念善者並為無信也世尊何等名涅槃善男子夫涅槃者名為解脫案僧亮曰將欲明色之與智為解脫故致發斯問涅槃名解脫者昔説涅槃是三事中解脫今正其名也敬遺記僧宗曰圓德妙體居萬纍之表故稱解脫也涅槃是彼國語就彼釋義應有別辭此間解脫即是翻彼釋義之名也昔曰孤滅解脫所以稱涅槃者以身智為纍故以滅纍為解脫也智秀曰此下三翻第一出體第二佛以譬顯其旨也第三顯譬與所譬同異也以昔辨解脫身智俱無而濫該佛果是以此第一翻辨正解脫之名也迦葉復言所言解脫至非諸聲聞緣覺所知案僧亮曰或有是色或非是色者以無纍為解脫身智無纍亦是解脫先定之也二乘解脫者分段煩惱滅稱為解脫而身智有為非解脫也如來身智無為得名解脫也云何住者謂相假名義得立住若其無色解脫之名依何而住非色者聲聞身智亦無麁結直以少故説為非色耳僧宗曰將明無纍先正其體體苟不無則孤滅權顯論其樞要在於色耳今言聲聞非色者不能垂形六道也為衆生故説非色者昔教但言捨身盡滅不説三事既無三事則無法身垂應之色故言非色也云何住者假執昔教無色為難欲令佛釋二乘之人非都無色是故佛以非想為喻實有細色説為非色二乘涅槃亦爾小應色直是于時不得説也爾時迦葉菩薩復白佛言至大般涅槃行解脫之義案僧亮曰衆生所好不同廣讚解脫明無苦不盡無樂不備稱情合願汲引多矣僧宗曰欲使無纍之德顯於未聞故復重請即是廣為衆生説也佛讚迦葉善哉善哉至是故如來不名命終案僧亮曰生老病死衆苦之本故先明也再説死者前明老死後明病死也明駿案此下廣名字功德品中八味具足也前文唯言五者不老六者不死略不云生之與病此中具述四患也如來清淨無有垢穢至生貪奪想解脫不爾明駿案廣第四清涼也瘡疣鬪諍皆不清涼因事而廣觸類長之餘效此也又解脫者名曰安靜至真解脫者即是如來明駿案廣三者安也夫不安者則求等侶無上安隱無憂無喜不須等侶也又解脫者無有塵垢至真解脫者即是如來明駿案廣八者快樂也苦以逼切為義今明無逼以顯快樂也又解脫者名無動法至真解脫者即是如來明駿案廣一者常也無常則流動不停也今以廣大如海為譬前品以常釋大今此以大釋常反䨱為義乃至無上上亦如是也又解脫者名曰恆法至真解脫者即是如來明駿案廣二者恆也常以不遷無動嶷然為義恆以亘然不改為義亦左右之辭耳所以未舉虛空無際無迹蓋言終曰恆然者也
